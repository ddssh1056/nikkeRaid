function recTripleForSteps_(steps){
  var key=steps.slice().sort(function(a,b){return a-b;}).join(','), triples=recData_().triples||[];
  for(var i=0;i<triples.length;i++){
    if(recSteps_(triples[i].attacks)===key && recTripleHasCombo_(triples[i])) return triples[i];
  }
  return null;
}
function recApplyAttack_(a,step){
  var r=recForStep_(step); if(!a||!r) return false;
  a.combo=r.combo||'';
  return true;
}
function pRecommendSimple(s){ if(state.pedit&&state.pedit.simple&&recApplyAttack_(state.pedit.simple[s],s)) renderPracticeEditor(); }
function pRecommendExt(i,j){ var set=state.pedit&&state.pedit.extended&&state.pedit.extended[i], a=set&&set.attacks[j]; if(a&&recApplyAttack_(a,a.boss)) renderPracticeEditor(); }
function pRecommendSet(i){
  var set=state.pedit&&state.pedit.extended&&state.pedit.extended[i]; if(!set) return;
  var steps=set.attacks.map(function(a){return Number(a.boss)||0;}).filter(Boolean), r=recTripleForSteps_(steps);
  if(!r||!r.attacks||!r.attacks.length){ alert('이 보스 조합에 맞는 3타 추천이 없습니다.'); return; }
  var oldByBoss={}; (set.attacks||[]).forEach(function(a){ var bb=Number(a.boss)||0; if(!oldByBoss[bb]) oldByBoss[bb]=[]; oldByBoss[bb].push(a); });
  set.attacks=(r.attacks||[]).slice(0,3).map(function(a){
    var b=Number(a.boss)||1, old=(oldByBoss[b]&&oldByBoss[b].shift())||{};
    return {boss:b,combo:a.combo||'',damage:Number(old.damage)||0,comment:old.comment||''};
  });
  renderPracticeEditor();
}
function pSetRecommended_(set){
  if(!set||!set.attacks||!set.attacks.length) return false;
  var r=recTripleForSteps_(set.attacks.map(function(a){return Number(a.boss)||0;})); if(!r) return false;
  var a=set.attacks||[], b=r.attacks||[];

  for(var i=0;i<a.length;i++) if(Number(a[i].boss)!==Number(b[i].boss)||!recAttackSame_(a[i],b[i])) return false;
  return true;
}

// 저장 시 축약어 텍스트 → 실제 니케 이름으로 고정(유니온이 축약어를 바꿔도 기록이 안 깨지게). 미해석 토큰은 원문 유지.
// 쉼표로 join(이름엔 쉼표가 없음) → 공백 포함 이름("아니스 : 스타")이 섞여도 재파싱 시 안전. (옛 공백 join 기록도 그리디 파서가 복원)
function resolveComboText(t){ return parseCombo(t).map(function(c){return c.name;}).join(', '); }
// 빈 기록 판정: simple에 (딜>0 또는 조합)이 하나도 없고, 내용 있는 extended 세트도 없으면 '빈 기록'.
function pIsEmptyData(data){
  var hasS=false; for(var s=1;s<=5;s++){ var d=data.simple&&data.simple[s]; if(d&&((Number(d.damage)||0)>0||((d.combo||'').trim()))){ hasS=true; break; } }
  var hasE=(data.extended||[]).some(function(set){ return (set.attacks||[]).some(function(a){ return (Number(a.damage)||0)>0||((a.combo||'').trim()); }); });
  return !hasS && !hasE;
}
function practiceJsonText_(data){ return JSON.stringify(data); }
function practiceTooLarge_(json){
  json=json||'';
  if(json.length<=45000) return false;
  alert('기록이 너무 큽니다(약 '+json.length.toLocaleString()+'자 / 한도 50,000자). 오래된 세트를 삭제해 주세요.');

function savePractice(){
  var pe=state.pedit; if(!pe) return;
  var simple={}; for(var s=1;s<=5;s++){ var d=pe.simple[s]||{combo:'',damage:0,comment:''}; simple[s]={combo:resolveComboText(d.combo),damage:Number(d.damage)||0,comment:d.comment||''}; }
  // 내용 없는 세트는 버림(빈 펼침 행 방지). 코멘트는 세트 단위(overall)로 통합.
  var extended=(pe.extended||[]).map(function(set){ return { attacks:(set.attacks||[]).map(function(a){ return {boss:a.boss, combo:resolveComboText(a.combo), damage:Number(a.damage)||0, comment:a.comment||''}; }).filter(pAttackHasContent_), overall:set.overall||'' }; })
    .filter(function(set){ return (set.attacks||[]).length>0; });
  var data=pNormalizeSingles_({ mode:pe.mode, simple:simple, extended:extended, priority:pe.priority, comment:pe.comment });
  var json=practiceJsonText_(data);

function expMemberData_(nick){
  var mem=state.practice.members.filter(function(x){return x.nickname===nick;})[0];
  if(!mem){ mem={nickname:nick,data:null}; state.practice.members.push(mem); state.practice.members.sort(function(a,b){return a.nickname<b.nickname?-1:(a.nickname>b.nickname?1:0);}); }
  if(!mem.data) mem.data={ mode:'extended', simple:pEmpty5_(), extended:[], priority:[], comment:'' };
  if(!mem.data.extended) mem.data.extended=[];
  return mem;
}
function saveMemberPractice_(nick,data){   // 빈 데이터면 삭제(모의전과 동일 규칙), 아니면 저장
  var json=practiceJsonText_(data);
  if(practiceTooLarge_(json)) return false;
  if(pIsEmptyData(data)){
    google.script.run.withFailureHandler(function(e){ alert('삭제 실패: '+e.message); }).deletePracticeMember(state.season, nick);
    var mem=state.practice.members.filter(function(x){return x.nickname===nick;})[0]; if(mem) mem.data=null;
  } else {
    google.script.run.withFailureHandler(function(e){ alert('저장 실패: '+e.message); }).savePracticeData(state.season, nick, json);
  }
  return true;
}
function saveExpSet(){
  var d=state.exp.draft, nick=(d.nickname||'').trim();
  if(!nick){ alert('닉네임을 입력하세요'); return; }
  var attacks=[], noElem=0;
  d.attacks.slice(0,(d.mode==='single'?1:3)).forEach(function(a){
    var step=bossStepByCode(a.code), hasC=(a.combo||'').trim(), dmg=Number(a.damage)||0;
    if(!hasC && dmg<=0) return;   // 빈 타는 스킵
    if(!step){ noElem++; return; }   // 내용은 있는데 속성(보스)이 안 정해진 타 — 무음 유실 대신 아래에서 중단
    attacks.push({ boss:step, combo:resolveComboText(a.combo), damage:dmg, comment:(a.comment||'').trim() });
  });
  if(noElem){ alert('속성이 선택되지 않은 타가 '+noElem+'개 있습니다. 각 타의 속성을 선택해주세요.'); return; }
  if(!attacks.length){ alert('코드(속성)로 보스가 정해지는 조합/딜량을 입력하세요'); return; }
  if(state.ssr && !(Number(d.syncLv)>0)){ alert('유니온 사격장은 싱크로 레벨도 입력해야 합니다.'); return; }
  var set={ attacks:attacks, overall:d.comment||'' };
  if(state.ssr) set.syncLv=Number(d.syncLv)||0;   // 사격장: 세트별 싱크로(같은 닉도 세트마다 다를 수 있음)
  // 닉을 바꿔 수정한 경우: 기존 멤버에서 세트 제거
  if(d.editSet>=0 && d.editNick && d.editNick!==nick){
    var old=state.practice.members.filter(function(x){return x.nickname===d.editNick;})[0];
    if(old&&old.data&&old.data.extended){ old.data.extended.splice(d.editSet,1); tPickDrop_(d.editNick,function(s){return s>=d.editSet;}); if(!saveMemberPractice_(old.nickname, old.data)) return; }
  }
  var mem=expMemberData_(nick);
  if(d.editSet>=0 && d.editNick===nick && mem.data.extended[d.editSet]){ mem.data.extended[d.editSet]=set; tPickDrop_(nick,function(s){return s===d.editSet;}); }
  else mem.data.extended.push(set);
  if(!saveMemberPractice_(nick, mem.data)) return;
  // 사격장 신규 추가: 연속 입력 편의 — 닉네임·싱크로(수동 여부 포함)·모드는 유지하고 조합/딜량만 비운다. 그 외(수정/일반 조합실험)는 전체 초기화.
  if(state.ssr && d.editSet<0)
    state.exp.draft={ editNick:'', editSet:-1, nickname:nick, syncLv:Number(d.syncLv)||0, syncManual:!!d.syncManual, mode:d.mode||'single',
      attacks:[{combo:'',code:'',damage:0,comment:''},{combo:'',code:'',damage:0,comment:''},{combo:'',code:'',damage:0,comment:''}], comment:'' };
  else state.exp.draft=newExpDraft();
  renderExpTab(); renderPracticeTable(); if(state.pTab==='tetris') renderTetris();
}
function editExpSet(nick,si){
  var mem=state.practice.members.filter(function(x){return x.nickname===nick;})[0]; if(!mem||!mem.data||!mem.data.extended) return;
  var set=mem.data.extended[si]; if(!set) return;
  var attacks=(set.attacks||[]).map(function(a){ return { combo:a.combo||'', code:codeOfStep(a.boss), damage:Number(a.damage)||0, comment:a.comment||'' }; });
  var mode=(attacks.length>1)?'triple':'single';
  while(attacks.length<3) attacks.push({combo:'',code:'',damage:0,comment:''});
  state.exp.draft={ editNick:nick, editSet:si, nickname:nick, syncLv:(Number(set.syncLv)||0), mode:mode, attacks:attacks, comment:(set.overall||'') };
  renderExpTab();
  try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(e){}
}
function expCancelEdit(){ state.exp.draft=newExpDraft(); renderExpTab(); }
function delExpSet(nick,si){
  if(!confirm('이 조합 기록을 삭제할까요?')) return;
  var mem=state.practice.members.filter(function(x){return x.nickname===nick;})[0]; if(!mem||!mem.data||!mem.data.extended) return;
  mem.data.extended.splice(si,1);
  tPickDrop_(nick,function(s){return s>=si;});   // 삭제로 뒤 세트 인덱스가 당겨짐 — 옛 인덱스 픽 무효화
  saveMemberPractice_(nick, mem.data);
  if(state.exp.draft.editNick===nick && state.exp.draft.editSet===si) state.exp.draft=newExpDraft();
  renderExpTab(); renderPracticeTable(); if(state.pTab==='tetris') renderTetris();
}

/* ===== 딜량 테트리스(#ptab-tetris) =====
   state.ov 실측을 먼저 고정하고, Practice extended 세트에서 체크한 타만 순서대로 얹는다.
   단계 단독HP=누적HP 차분, 막타 초과분은 다음 단계로 넘기지 않는 no-carry. 5보스 Lv.4만 무한 흡수. */
function ensureTetrisState_(){
  if(!state.tetris || state.tetris.season!==state.season){
    state.tetris={ season:state.season, selected:'', online:{}, picks:{}, exclude:{}, seq:0,
      quick:{nickname:'',selected:{},damage:{}}, quickEntries:[], showSingles:false, sourceSort:{key:''}, _last:null };
  }
  if(!state.tetris.sourceSort) state.tetris.sourceSort={key:''};
  if(!state.tetris.exclude) state.tetris.exclude={};
  if(state.tetris.margin==null) state.tetris.margin=0;   // 오버딜 마진(raw, *1e8): 0=종전(최소 오버킬), >0이면 처치 오버킬을 이 값 이상으로 여유
  return state.tetris;
}
// 멤버의 Practice extended가 바뀌면(세트 수정·삭제·재구성) 그 멤버의 테트리스 픽을 무효화한다.
// 픽은 세트 '배열 인덱스'(si)를 가리키므로 splice/재구성 후엔 다른 세트를 가리키게 된다.
var T_COMBO_SET_IDX=100000;   // 멀티 1타 결합 세트의 고정 인덱스(실제 extended 세트 인덱스와 충돌하지 않는 값)
function tPickDrop_(nick,test){
  var ts=state.tetris; if(!ts) return;
  var picks=ts.picks, p=picks&&picks[nick];
  // 결합 1타 세트(T_COMBO_SET_IDX)는 기록을 편집/삭제하면 attacks가 재구성되므로 항상 무효화한다.
  if(p && (!test||test(Number(p.set))||Number(p.set)===T_COMBO_SET_IDX)) delete picks[nick];
  if(ts.exclude) Object.keys(ts.exclude).forEach(function(k){ if(k.indexOf(nick+'|')!==0) return; var si=Number(k.split('|')[1]); if(!test||test(si)||si===T_COMBO_SET_IDX) delete ts.exclude[k]; });
}
function tBossStepByName_(name){
  var b=((state.practice&&state.practice.bosses)||[]).filter(function(x){return x.name===name;})[0];
  return b?Number(b.step):0;
}
function tetrisData(){
  var pr=state.practice, ov=state.ov||{}, actualByNick={}, actualByBoss={}, syncByNick={};
  if(!pr) return null;
  (ov.members||[]).forEach(function(m){ syncByNick[m.nickname]=Number(m.syncLv)||0; });
  (pr.members||[]).forEach(function(m){ syncByNick[m.nickname]=Math.max(Number(syncByNick[m.nickname])||0, Number(m.syncLv)||0); });
  var bosses=pr.bosses.map(function(b){
    var cum=(b.hpCum||[]).map(Number), phases=cum.map(function(v,i){return Math.max(0,v-(i?cum[i-1]:0));});
    // 사격장: 실측 진행 없음(전 보스 신선) + 같은 이름이라 name 매칭이 충돌하므로 ov 미사용. step5 무한HP도 적용 안 함.
    var ob=state.ssr?null:(((ov.bosses||[]).filter(function(x){return x.name===b.name;})[0])||null);
    actualByBoss[b.step]=[];
    return {step:Number(b.step),name:b.name,weak:b.weak,weakColor:b.weakColor,cum:cum,phases:phases,
      finalHp:cum.length?cum[cum.length-1]:0,unlimited:(Number(b.step)===5 && !state.ssr),ov:ob};
  });
  (ov.members||[]).forEach(function(m){
    var hits=(m.hits||[]).slice().sort(function(a,b){ return (Number(a.attackIndex)||0)-(Number(b.attackIndex)||0); }),
      info={count:hits.length,steps:[],hits:[],lastIdx:Number(m.lastIdx)||0,usedNikes:{}};
    hits.forEach(function(h,hi){
      var step=tBossStepByName_(h.boss)||Number(h.step)||0;
      if(step===6) step=5;

function anPrevValue_(m,seasons,s,key){
  var ix=seasons.indexOf(s);
  for(var i=ix-1;i>=0;i--){ var e=m.series[seasons[i]]; if(e&&e[key]!=null) return e[key]; }
  return null;
}
function anMetricCell_(m,s,md,seasons){

  if(!e||e[md.key]==null) return '<td></td>';

  else if(md.key==='syncLv'){
    var pv=anPrevValue_(m,seasons,s,md.key), delta=(pv==null)?null:(Number(v)-Number(pv));
    style=' style="background:'+syncGrowthBg(delta==null?0:delta)+'"';   // 구간당 성장률 기준(기록 없으면 노랑)

function renderAnTable(){

  while(slots.length<9) slots.push(null);   // 최신 9차수만 표시(빈 차수는 오른쪽). 끝칸(10번째)=최근 6차 요약.
  var sortS=state.anSortSeason, sortDir=state.anSortDir, isSync=(md.key==='syncLv');
  var rows=a.members.slice().sort(function(x,y){
    if(sortS==='sum'){   // 끝칸(최근 6차 요약) 클릭 정렬: 요약값 기준.
      var mx=anSummary_(x,seasons,md), my=anSummary_(y,seasons,md);
      var vx=mx?mx.v:null, vy=my?my.v:null;
      if(vx==null&&vy==null) return 0; if(vx==null) return 1; if(vy==null) return -1; return sortDir==='asc'?(vx-vy):(vy-vx);
    }
    if(sortS){   // 특정 차수 칸 클릭 정렬. 싱크로는 '레벨 성장량' 기준, 그 외는 그 차수 값 기준.
      var sx=isSync?anGrowth_(x,seasons,sortS):(x.series[sortS]||{})[md.key];
      var sy=isSync?anGrowth_(y,seasons,sortS):(y.series[sortS]||{})[md.key];
      if(sx==null&&sy==null) return 0; if(sx==null) return 1; if(sy==null) return -1; return sortDir==='asc'?(sx-sy):(sy-sx);
    }
    var xv=(x.series[last]||{})[md.key], yv=(y.series[last]||{})[md.key];   // 기본=최신 차수 값 내림차순(싱크로=최신 레벨)
    if(xv==null&&yv==null) return 0; if(xv==null) return 1; if(yv==null) return -1; return md.rev?(xv-yv):(yv-xv);
  });
  var sumLab=anSummaryHead_(md);

    '<th class="ansum" style="cursor:pointer" title="최근 6개 차수 '+sumLab+' — 클릭하면 정렬" onclick="anSortSummary()">최근6차'+((state.anSortSeason==='sum')?(state.anSortDir==='asc'?' ▲':' ▼'):'')+'<span class="ansumnote">'+sumLab+'</span></th></tr>';
  var body=rows.map(function(m){
    var tds=slots.map(function(s){ return anMetricCell_(m,s,md,seasons); }).join('');
    var sm=anSummary_(m,seasons,md);
    tds+='<td class="ansum">'+(sm?sm.text:'·')+'</td>';
    return '<tr class="anrow'+(m.nick===tgt?' antarget':'')+'" onclick="setAnTarget(\''+jsq(m.nick)+'\')"><td class="annick">'+esc(m.nick)+'</td>'+tds+'</tr>';
  }).join('');
  el('anTable').innerHTML='<table class="antbl">'+col+head+body+'</table>';
}
// 끝칸 요약: 지표별 집계 방식 — 보정%·총합딜%=평균, 싱크로·총딜=평균 상승량, 막타=누적 합계. 최근 6개 차수 기준.
function anSummaryHead_(md){
  if(md.key==='contrib'||md.key==='share') return '평균';
  if(md.key==='finalHits') return '누적';
  return '평균상승';   // syncLv·totalDamage
}
function anSummary_(m,seasons,md){
  var recent=seasons.slice(-6), key=md.key, vals=[];
  if(key==='contrib'||key==='share'){
    recent.forEach(function(s){ var e=m.series[s]; if(e&&e[key]!=null) vals.push(Number(e[key])); });
    if(!vals.length) return null;
    var avg=vals.reduce(function(p,q){return p+q;},0)/vals.length;
    return {v:avg, text:md.f(avg)};
  }
  if(key==='syncLv'||key==='totalDamage'){
    recent.forEach(function(s){ var g=anGrowthKey_(m,seasons,s,key); if(g!=null) vals.push(g); });
    if(!vals.length) return null;
    var avg=vals.reduce(function(p,q){return p+q;},0)/vals.length, r=(key==='syncLv')?(Math.round(avg*10)/10):Math.round(avg);
    return {v:avg, text:(r>0?'+':(r<0?'-':''))+(key==='syncLv'?Math.abs(r):fmtDmg(Math.abs(r)))};
  }
  if(key==='finalHits'){
    var sum=0, has=false; recent.forEach(function(s){ var e=m.series[s]; if(e&&e.finalHits!=null){ has=true; sum+=Number(e.finalHits)||0; } });
    return has?{v:sum, text:''+sum}:null;
  }
  return null;
}
function anGrowth_(m,seasons,s){   // 그 차수의 싱크로 레벨 성장량(직전 기록 대비). 기록 없으면 null, 직전 없으면 0.
  return anGrowthKey_(m,seasons,s,'syncLv');
}
function anGrowthKey_(m,seasons,s,key){   // 그 차수 값의 직전 기록 대비 상승량. 기록 없으면 null, 직전 없으면 0.
  var e=m.series[s]; if(!e||e[key]==null) return null;
  var pv=anPrevValue_(m,seasons,s,key);
  return pv==null?0:(Number(e[key])-Number(pv));
}
function anSortBy(s){
  s=Number(s);
  if(state.anSortSeason!==s){ state.anSortSeason=s; state.anSortDir='desc'; }
  else if(state.anSortDir==='desc'){ state.anSortDir='asc'; }
  else { state.anSortSeason=null; state.anSortDir=null; }
  renderAnTable();
}
function anSortSummary(){   // 끝칸(최근 6차 요약열) 헤더 클릭: 내림 → 오름 → 해제.
  if(state.anSortSeason!=='sum'){ state.anSortSeason='sum'; state.anSortDir='desc'; }
  else if(state.anSortDir==='desc'){ state.anSortDir='asc'; }
  else { state.anSortSeason=null; state.anSortDir=null; }
  renderAnTable();
}

/* ===== 옵션(⚙) ===== */
function recClone_(r){
  r=r||{}; var out={single:{},triples:[]};
  Object.keys(r.single||{}).forEach(function(k){ var x=r.single[k]||{}; out.single[k]={combo:x.combo||'',damage:Number(x.damage)||0}; });
  (r.triples||[]).forEach(function(set){
    out.triples.push({attacks:(set.attacks||[]).map(function(a){return {boss:Number(a.boss)||1,combo:a.combo||'',damage:Number(a.damage)||0};})});
  });
  return out;
}
function recDraft_(){
  if(!state.recDraft || state.recDraft.season!==state.season){
    var d=recClone_((state.practice&&state.practice.recommended)||{});
    recEnsureTripleRows_(d);
    d.season=state.season; state.recDraft=d;
  }
  return state.recDraft;

  }).withFailureHandler(function(){ state._sortPriLoading=false; }).getSortPriority();
}
function renderSortPriorityInputs_(){   // 축약어 행의 우선순위 입력칸 값을 state에서 반영(전체 재렌더 없이)
  var rows=document.querySelectorAll('#aliasList .aliasrow'), m=state.sortPriority||{};
  for(var i=0;i<rows.length;i++){ var nm=rows[i].getAttribute('data-name'), inp=rows[i].querySelector('.prioin'); if(inp) inp.value=(Number(m[nm])||0); }
}

  var ebtns=ELEMENTS.map(function(c){ var on=(ef===c); return '<button class="aliasfbtn elem'+(on?' on':'')+'" style="'+(on?('background:'+pastel(elemColorJs(c))+';box-shadow:inset 0 0 0 2px '+elemColorJs(c)):'')+'" title="'+esc(c)+'만 보기" onclick="aliasSetElemFilter(\''+c+'\')"><i class="bdot" style="background:'+elemColorJs(c)+'"></i>'+esc(c)+'</button>'; }).join('');
  return '<span class="aliasflab muted">버스트</span>'+bbtns+'<span class="aliasflab muted">속성</span>'+ebtns+
    ((bf||ef)?'<button class="aliasfbtn clear" title="필터 해제" onclick="aliasClearFilters_()">해제</button>':'');
}
function optAliasHtml(){

  if(!state.optAliasByName){   // {니케이름: "축약어1, 축약어2"} (제작자 사전 위 우리 유니온 별칭)
    state.optAliasByName={};
    ((state.practice&&state.practice.aliases)||[]).forEach(function(a){ if(!a.name||!a.alias) return; state.optAliasByName[a.name]=state.optAliasByName[a.name]?(state.optAliasByName[a.name]+', '+a.alias):a.alias; });
  }
  if(state.sortPriority==null) state.sortPriority={};
  var prio=state.sortPriority;
  var rows=nik.map(function(e){ var nm=e.n, val=state.optAliasByName[nm]||'', def=e.a||'', shown=val||def, pv=Number(prio[nm])||0;
    var bn=burstNorm_(e.b), code=e.c||'';
    var burstCell=bn?'<span class="aliasburst b'+bn+'">'+romanBurst_(bn)+'</span>':'<span class="aliasburst empty">·</span>';
    var elemCell=code?'<span class="aliaselem" style="background:'+pastel(elemColorJs(code))+'">'+esc(code)+'</span>':'<span class="aliaselem empty">·</span>';
    return '<div class="aliasrow" data-name="'+esc(nm)+'" data-default="'+esc(def)+'" data-burst="'+bn+'" data-elem="'+esc(code)+'" onmousedown="aliasMarkEdit(this)"><span class="aliasnm" title="'+esc(nm)+'">'+esc(nm)+'</span>'+
      '<span class="aliasdef" title="'+esc(shown||'')+'">'+(shown?esc(shown):'·')+'</span>'+
      '<input class="aliasin" value="'+esc(val)+'" placeholder="축약어 (쉼표로 여러 개)" oninput="state.optAliasByName[\''+jsq(nm)+'\']=this.value;aliasCheckDup_(this)">'+
      burstCell+elemCell+
      '<input class="prioin" type="number" step="1" value="'+pv+'" title="같은 버스트 내 정렬 우선순위(클수록 앞)" oninput="state.sortPriority[\''+jsq(nm)+'\']=(parseInt(this.value)||0)">'+
    '</div>'; }).join('');
  return '<div class="optsec"><h2>축약어, 정렬</h2>'+
    '<p class="muted">조합 입력에 쓸 우리 유니온 줄임말. 가운데는 제작자 기본 줄임말이며, <b>같은 글자가 겹치면 우리 유니온 별칭이 우선</b>합니다. 오른쪽 <b>정렬 우선순위</b>는 기록의 「조합 ↺(정렬 조합)」에서 <b>같은 버스트 안의 순서</b>를 정한다(숫자가 클수록 앞, 기본 0). 버스트/속성 버튼으로 해당 그룹만 추려볼 수 있습니다(다시 누르면 해제).</p>'+
    '<div id="aliasFBar" class="aliasfbar">'+aliasFilterBarHtml_()+'</div>'+
    '<input class="pinput" id="aliasSearch" placeholder="🔍 니케 이름 검색" style="width:100%;margin-bottom:8px" value="'+esc(state.aliasSearch||'')+'" oninput="aliasFilter(this.value)">'+
    '<div id="aliasList" class="aliaslist">'+(rows?('<div class="aliashead"><span>이름</span><span>축약어</span><span>유니온 축약어</span><span>버스트</span><span>속성</span><span>정렬</span></div>'+rows):'<div class="muted" style="font-size:12px;padding:6px">니케 사전을 불러오지 못했습니다.</div>')+'</div>'+
    '<div class="optbtns"><button class="pillbtn" onclick="saveAliasesUI(event)">저장</button><span id="aliasMsg" class="muted" style="font-size:12px"></span></div></div>';
}
function aliasApplyFilters_(){
  var q=(state.aliasSearch||'').trim().toLowerCase(), bf=state.aliasBurstFilter||'', ef=state.aliasElemFilter||'';
  var rows=document.querySelectorAll('#aliasList .aliasrow');
  for(var i=0;i<rows.length;i++){ var r=rows[i], nm=(r.getAttribute('data-name')||'').toLowerCase(), df=(r.getAttribute('data-default')||'').toLowerCase(), inp=r.querySelector('.aliasin'), al=((inp&&inp.value)||'').toLowerCase(), bu=r.getAttribute('data-burst')||'', em=r.getAttribute('data-elem')||'';
    var ok=(!q||nm.indexOf(q)>=0||df.indexOf(q)>=0||al.indexOf(q)>=0) && (!bf||bu===bf) && (!ef||em===ef);
    r.style.display=ok?'':'none'; }
}
function aliasRefreshBar_(){ var bar=el('aliasFBar'); if(bar) bar.innerHTML=aliasFilterBarHtml_(); }
function aliasFilter(q){ state.aliasSearch=q; aliasApplyFilters_(); }
function aliasSetBurstFilter(b){ state.aliasBurstFilter=(state.aliasBurstFilter===b)?'':b; aliasRefreshBar_(); aliasApplyFilters_(); }
function aliasSetElemFilter(c){ state.aliasElemFilter=(state.aliasElemFilter===c)?'':c; aliasRefreshBar_(); aliasApplyFilters_(); }
function aliasClearFilters_(){ state.aliasBurstFilter=''; state.aliasElemFilter=''; aliasRefreshBar_(); aliasApplyFilters_(); }
function aliasMarkEdit(row){ var rows=document.querySelectorAll('#aliasList .aliasrow'); for(var i=0;i<rows.length;i++) rows[i].classList.remove('editing'); if(row) row.classList.add('editing'); }
// 같은 축약어(유니온 입력 토큰 또는 기본 축약어)를 2명 이상이 쓰면 충돌 → 해당 행 빨간 테두리.
function aliasCheckDup_(activeInput){
  var rows=document.querySelectorAll('#aliasList .aliasrow'), i, tokOwners={}, rowToks=[];
  for(i=0;i<rows.length;i++){
    var r=rows[i], nm=r.getAttribute('data-name')||'', inp=r.querySelector('.aliasin'), val=(inp&&inp.value)||'', src=val, toks=[], seen={};
    // 입력 중인 칸은 '마지막 콤마 이전(확정된)' 토큰만 검사 — 콤마 입력 전까진 그 토큰을 체크하지 않음.
    if(inp===activeInput){ var lc=Math.max(val.lastIndexOf(','),val.lastIndexOf('，')); src=(lc>=0)?val.slice(0,lc):''; }
    // 우리 유니온 별칭(직접 입력)만, 토큰 '완전 일치'로 충돌 판정(제작자 기본 줄임말·부분일치 제외: '나'≠'나가').
    src.split(/[,，]/).forEach(function(t){ t=t.trim().toLowerCase(); if(t&&!seen[t]){ seen[t]=1; toks.push(t); } });
    rowToks.push(toks);
    toks.forEach(function(t){ (tokOwners[t]||(tokOwners[t]={}))[nm]=1; });
  }
  for(i=0;i<rows.length;i++){
    var me=rows[i].getAttribute('data-name')||'', confs=[], seenc={};
    for(var j=0;j<rowToks[i].length;j++){ var t=rowToks[i][j], own=tokOwners[t];
      if(own && Object.keys(own).length>=2 && !seenc[t]){ var others=Object.keys(own).filter(function(o){return o!==me;});
        if(others.length){ seenc[t]=1; confs.push("'"+t+"' = "+others.join(', ')); } } }
    aliasSetDupMsg_(rows[i],confs);
  }
}
// 충돌 행에 빨간 테두리(.dup) + 입력칸 아래에 어떤 축약어가 누구와 겹치는지 표시.
function aliasSetDupMsg_(row,confs){
  var ex=row.querySelector('.aliasdup');
  if(!confs.length){ row.classList.remove('dup'); if(ex&&ex.parentNode) ex.parentNode.removeChild(ex); return; }
  row.classList.add('dup');
  if(!ex){ ex=document.createElement('div'); ex.className='aliasdup'; row.appendChild(ex); }
  ex.innerHTML='⚠ 충돌: '+confs.map(esc).join(' · ');
}
function saveAliasesUI(ev){
  var list=[], byn=state.optAliasByName||{};
  Object.keys(byn).forEach(function(nm){ var v=(byn[nm]||'').trim(); if(!v) return;
    v.split(/[,，]/).forEach(function(al){ al=al.trim(); if(al) list.push({name:nm, alias:al}); }); });
  var msg=el('aliasMsg'); if(msg) msg.textContent='저장 중…';
  try{ google.script.run.saveSortPriority(JSON.stringify(state.sortPriority||{}),adminKey_()); }catch(e0){}   // 정렬 우선순위도 함께 저장
  google.script.run.withSuccessHandler(function(r){
    if(state.practice) state.practice.aliases=list.slice();
    buildNikIndex();   // 병합 즉시 갱신
    if(msg) msg.textContent='저장됨 ('+((r&&r.count)||list.length)+'개)';
  }).withFailureHandler(function(e){ if(msg) msg.textContent='실패: '+e.message; }).saveAliases(JSON.stringify(list),adminKey_());
}
function optCacheHtml(){
  return '<div class="optsec"><h2>데이터 · 캐시</h2>'+
    '<p class="muted">시트 캐시를 비우고 공유데이터(보스 HP·이미지·니케 사전)를 다시 받습니다. 최신 차수/이미지가 안 보일 때 사용.</p>'+
    '<div class="optbtns"><button class="pillbtn" onclick="flushCacheUI(event)">캐시 새로고침</button><span id="flushMsg" class="muted" style="font-size:12px"></span></div></div>';
}
function flushCacheUI(ev){ var msg=el('flushMsg'); if(msg) msg.textContent='처리 중…';
  google.script.run.withSuccessHandler(function(){ if(msg) msg.textContent='완료 — 헤더 ↻ 새로고침으로 반영하세요.'; })
    .withFailureHandler(function(e){ if(msg) msg.textContent='실패: '+e.message; }).flushCache();
}

/* ===== 유니온 멤버 관리(옵션 섹션) ===== */
function loadMembersUI(){
  google.script.run.withSuccessHandler(function(r){
    applyMembersData_(r);
    if(el('page-options').style.display!=='none') renderOptions();
  }).withFailureHandler(function(e){ state._memLoading=false; var h=el('optBody'); if(h&&!state.memEdit) state.memEdit=[]; }).getMembers();
}
function optMembersHtml(){
  if(!state.memEdit) return '<div class="optsec"><h2>유니온 멤버 관리</h2><p class="muted">멤버 명단 불러오는 중…</p></div>';
  var me=state.memEdit, active=[], inactive=[], former=[], hidden=[];
  me.forEach(function(m,i){ m._i=i; if(m.mergedInto) return; if(m.status==='hidden') hidden.push(m); else if(m.status==='former') former.push(m); else if(m.status==='inactive') inactive.push(m); else active.push(m); });
  var latest=state._latestSeason||0, visible=active.concat(inactive), excluded=former.concat(hidden);
  var showHidden=!!state.memShowHidden;
  var rosterInfo=state._rosterCount?('현재 로스터 '+state._rosterCount+'명 기준'):'LastRoster 없음 — 기존 미참여 기준으로 표시';
  var topTools='<div class="memtools">'+
      '<span class="muted" style="font-size:12px">멤버 명단은 블라링크(LastRoster)에서 자동으로 가져옵니다.</span>'+
      '<button class="pillbtn" onclick="saveMembersUI(event)">저장</button>'+
      '<button class="pillbtn'+(showHidden?' on':'')+'" onclick="memToggleHidden()">'+(showHidden?'탈퇴 멤버 숨기기':'탈퇴 멤버 관리')+(excluded.length?(' ('+excluded.length+')'):'')+'</button>'+
      '<span id="memMsg" class="muted" style="font-size:12px"></span>'+
    '</div>';
  function memSub(m){
    if(m.status==='former') return 'LastRoster 없음 · 분석 제외';
    if(m.status==='hidden') return '수동 분석 제외';
    if(m.inRoster===false && m.status==='active') return 'LastRoster 없음 · 수동 포함';
    if(m.fromRoster&&!m.fromRaw) return '현재 로스터 · 기록 없음';
    if(m.fromRaw) return '최근 '+m.lastSeason+'차';
    return m.manual?'수동':'';
  }
  function normalCard(m){
    var stale=m.fromRaw&&latest&&m.lastSeason&&m.lastSeason<latest, isInactive=(m.status==='inactive')||stale;
    return '<div class="memrow"><span class="memnick">'+esc(m.nick)+'</span>'+
      '<span class="memsub muted">'+esc(memSub(m))+'</span>'+
      (isInactive?'<button class="pillbtn" onclick="memKeepInactive('+m._i+')">미참여</button> ':'')+
      '<button class="pdel" onclick="memExcludeAnalysis('+m._i+')">분석 제외</button>'+
      (m.manual?'<button class="pdel" onclick="memDelManual('+m._i+')" title="완전 삭제">✕</button>':'')+'</div>';
  }
  var activeRows=visible.map(normalCard).join('')||'<div class="muted" style="font-size:12px;padding:4px 0">없음</div>';
  var hiddenRows=excluded.map(function(m){
    return '<div class="memrow"><span class="memnick" style="opacity:var(--dim-weak)">'+esc(m.nick)+'</span>'+
      '<span class="memsub muted">'+esc(memSub(m))+'</span>'+
      '<button class="pillbtn" onclick="memIncludeAnalysis('+m._i+')">분석 포함</button></div>';
  }).join('')||'<div class="muted" style="font-size:12px;padding:4px 0">없음</div>';
  return '<div class="optsec"><h2>유니온 멤버 관리</h2>'+
    '<p class="muted" style="margin:0 0 8px">'+esc(rosterInfo)+' · 개요는 과거 기여 보존, 분석탭만 포함/제외가 적용됩니다.</p>'+
    topTools+
    '<div class="memgrid'+(showHidden?' two':'')+'">'+
      '<div><div class="memhd">유니온 멤버 ('+visible.length+')</div><div class="memcards">'+activeRows+'</div></div>'+
      (showHidden?('<div><div class="memhd">분석 제외 · 탈퇴 ('+excluded.length+')</div><div class="memcards">'+hiddenRows+'</div></div>'):'')+
    '</div>'+
  '</div>';
}
function memWithdraw(i){ memExcludeAnalysis(i); }
function memToggleHidden(){ state.memShowHidden=!state.memShowHidden; renderOptions(); }
function memKeepInactive(i){ var m=state.memEdit[i]; if(m) m.status='inactive'; renderOptions(); }
function memExcludeAnalysis(i){ var m=state.memEdit[i]; if(m){ m.status=(m.inRoster===false&&!m.manual)?'former':'hidden'; } renderOptions(); }
function memIncludeAnalysis(i){ var m=state.memEdit[i]; if(m){ m.status='active'; } renderOptions(); }
function memDelManual(i){ state.memEdit.splice(i,1); renderOptions(); }
function memAddManual(){
  var nk=((el('memAddNick')||{}).value||'').trim(); if(!nk) return;
  state.memEdit.push({ openid:'manual:'+Date.now(), nick:nk, lastSeason:0, fromRaw:false, fromRoster:false, inRoster:false, analysisIncluded:true, manual:true, status:'active', mergedInto:'' });
  renderOptions();
}
function saveMembersUI(ev){
  var list=state.memEdit.filter(function(m){
    if(m.status==='hidden'||m.mergedInto||m.manual) return true;
    if(m.status==='active'&&m.inRoster===false) return true;   // LastRoster 제외자를 분석에 수동 포함
    return false;
  }).map(function(m){ return { openid:m.openid, name:((m.manual||!m.fromRaw)?m.nick:''), status:m.status, mergedInto:m.mergedInto||'' }; });
  var msg=el('memMsg'); if(msg) msg.textContent='저장 중…';
  google.script.run.withSuccessHandler(function(r){
    if(msg) msg.textContent='저장됨 ('+((r&&r.count)||list.length)+'행). 개요·분석은 ↻ 새로고침/재진입 시 반영.';
    state.viewEpoch++; state.ov=null; state.analysis=null; state.practice=null; state.overviewCache={};   // 전 시즌 파생값 영향
  }).withFailureHandler(function(e){ if(msg) msg.textContent='실패: '+e.message; }).saveMembers(JSON.stringify(list),adminKey_());
}
