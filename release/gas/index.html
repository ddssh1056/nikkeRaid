<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>유레 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    :root{
      /* Chrome / neutral (B 디자인: 쿨톤 배경 + 흰 카드) */
      --bg:#F2F4F9; --panel:#ffffff; --panel2:#F7F9FD; --line:#E4E8F1; --line2:#C3CBDD;
      --txt:#1B2236; --txt2:#39415A; --muted:#69718A; --ph:#8A92AA;
      /* Interaction */
      --ink:#1B2236; --accent:#3D5AE0; --accent-soft:rgba(61,90,224,.10); --accent-line:#B8C9FF; --accent-ring:inset 0 0 0 2px var(--accent);
      --accent-glow-strong:0 0 0 3px rgba(61,90,224,.22),0 3px 8px rgba(61,90,224,.22);
      /* Data colors (유지: 막타=빨강 / 오버딜=파랑 / 파스텔 4단계) */
      --red:#e23a4e; --red-soft:#f8d7dc; --od-blue:#1746c7; --ok:#3ac06b; --ok-soft:#dff4e4;
      --warn:#8a5b00; --warn-soft:#fff5df; --warn-line:#f1c56f; --success:#23743a; --success-soft:#f0f7ee; --success-line:#acd8a5;
      /* Type */
      --fs-tiny:11px; --fs-small:12px; --fs-sub:13px; --fs-body:14px; --fs-head:16px; --fs-lg:18px;
      --fs-num:clamp(15px,1.5vw,20px); --fs-display:clamp(22px,2.1vw,32px);
      --fw-regular:400; --fw-label:600; --fw-strong:700;
      /* Radius */
      --r-none:0; --r-sm:8px; --r-md:10px; --r-lg:14px; --r-pill:999px;
      /* Shadow / rings */
      --sh-none:none; --sh-1:0 1px 3px rgba(27,34,54,.06); --sh-2:0 6px 20px rgba(27,34,54,.13); --sh-3:0 14px 44px rgba(20,30,60,.28);
      --line-ring:inset 0 0 0 1px var(--line2); --red-ring:inset 0 0 0 2px var(--red); --red-ring-strong:inset 0 0 0 2px var(--red); --ok-mark:inset 4px 0 0 var(--ok);
      /* State */
      --dim-off:.35; --dim-weak:.55;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--txt); font-family:'Pretendard Variable',Pretendard,'Segoe UI','Malgun Gothic',sans-serif; font-size:var(--fs-body); letter-spacing:-0.01em; }
    header{ position:sticky; top:0; z-index:10; background:var(--panel); border-bottom:1px solid var(--line); padding:10px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; box-shadow:var(--sh-1); }
    header h1{ font-size:var(--fs-head); margin:0; font-weight:800; letter-spacing:-0.02em; }
    nav{ display:flex; gap:2px; background:#EEF1F8; border-radius:var(--r-pill); padding:4px; }
    nav button{ background:transparent; color:var(--muted); border:0; padding:7px 16px; border-radius:var(--r-pill); cursor:pointer; font-size:13px; font-weight:var(--fw-label); font-family:inherit; }
    nav button.active{ background:var(--ink); color:#fff; font-weight:var(--fw-strong); }
    nav button:disabled{ opacity:var(--dim-off); filter:grayscale(1); cursor:not-allowed; }
    .spacer{ flex:1; }
    select{ background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:9px; padding:7px 10px; font-family:inherit; font-weight:var(--fw-label); }
    main{ padding:16px 12px; max-width:1680px; width:96%; margin:0 auto; }
    .panel{ background:var(--panel); border:0; border-radius:16px; padding:16px 18px; margin-bottom:14px; box-shadow:var(--sh-1); }
    .panel h2{ font-size:var(--fs-body); margin:0 0 10px; color:var(--muted); font-weight:var(--fw-label); display:flex; align-items:center; gap:8px; }
    .chip{ display:inline-block; padding:2px 9px; border-radius:var(--r-pill); font-size:var(--fs-small); font-weight:var(--fw-strong); }
    .bdot{ display:inline-block; width:7px; height:7px; border-radius:var(--r-pill); flex:none; }
    .muted{ color:var(--muted); }
    .pillbtn{ background:var(--panel2); color:var(--accent); border:1px solid var(--accent); border-radius:var(--r-pill); padding:4px 12px; cursor:pointer; font-size:var(--fs-small); font-weight:var(--fw-strong); }
    .pillbtn.on{ background:var(--accent); border-color:var(--accent); color:var(--panel); }
    .bar{ height:7px; background:var(--panel2); border-radius:var(--r-sm); overflow:hidden; width:100%; border:1px solid var(--line); }
    .bar > i{ display:block; height:100%; }

    /* 정렬 토글 */
    .tgwrap{ display:flex; align-items:center; gap:6px; min-width:0; }
    .tglabel{ color:var(--muted); font-size:var(--fs-small); margin-right:1px; white-space:nowrap; }
    .tg{ display:inline-flex; gap:2px; padding:3px; border:0; border-radius:9px; background:#EEF1F8; box-shadow:none; }
    .tg button{ background:transparent; color:var(--muted); border:0; border-radius:7px; padding:5px 12px; cursor:pointer; font-size:var(--fs-small); font-weight:var(--fw-strong); white-space:nowrap; font-family:inherit; }
    .tg button.active{ color:#fff; background:var(--ink); box-shadow:none; }
    .filterchips{ display:flex; align-items:center; gap:5px; min-height:30px; padding:3px 8px; border:1px solid var(--line); border-radius:var(--r-pill); background:var(--panel2); color:var(--muted); font-size:var(--fs-small); white-space:nowrap; }
    .filterchip{ display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:var(--r-pill); background:var(--accent-soft); color:var(--od-blue); font-weight:var(--fw-strong); }
    .filterchip.empty{ background:transparent; color:var(--muted); font-weight:var(--fw-strong); padding:0; }
    .filterclear{ width:28px; height:28px; border:2px solid var(--red); border-radius:var(--r-sm); background:var(--panel); color:var(--red); font-weight:var(--fw-strong); cursor:pointer; line-height:1; }

    /* ===== 전황 히어로(신설): 전체 숫자만 — 보스별 진행도는 보스 카드가 유일한 소스 ===== */
    .ovhero-in{ display:flex; align-items:center; gap:36px; flex-wrap:wrap; }
    .ovhero-k{ font-size:11.5px; font-weight:var(--fw-strong); color:var(--ph); letter-spacing:.05em; margin-bottom:5px; }
    .ovhero-num{ font-size:clamp(28px,2.6vw,40px); font-weight:800; letter-spacing:-.04em; line-height:1; font-variant-numeric:tabular-nums; }
    .ovhero-num .ovhero-sub{ font-size:13px; font-weight:var(--fw-label); color:var(--muted); margin-left:9px; letter-spacing:0; }
    .ovhero-stats{ display:flex; gap:36px; padding-left:36px; border-left:1px solid #EEF1F8; }
    .ovhero-v{ font-size:19px; font-weight:var(--fw-strong); letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
    @media(max-width:700px){ .ovhero-stats{ gap:20px; padding-left:20px; } }
    /* 상단 랭킹 — 보정 기여% TOP3 1칸 + 속성별 개별타수 딜량 TOP3 5칸. 좁아지면 속성칸이 오른쪽부터 사라지고, 마지막에 보정칸이 사라짐. */
    .ovtop5{ display:flex; gap:6px; flex:0 1 auto; min-width:0; margin-left:auto; }
    .ovt5box{ min-width:0; display:flex; flex-direction:column; gap:3px; padding:5px 9px; border:1px solid var(--line); border-radius:var(--r-md); background:var(--panel2); }
    .ovt5box.rankbox{ background:var(--accent-soft); border-color:var(--accent); }
    .ovt5box.elembox{ background:var(--panel); }
    .ovt5hd{ font-size:9.5px; font-weight:var(--fw-strong); color:var(--muted); letter-spacing:.2px; margin-bottom:1px; }
    .ovt5e{ display:flex; align-items:center; gap:6px; min-width:0; }
    .ovt5e.muted{ color:var(--line2); justify-content:center; }
    .ovt5rank{ flex:none; width:15px; height:15px; border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#fff; background:var(--muted); font-variant-numeric:tabular-nums; }
    .ovt5rank.r1{ background:#E3A800; } .ovt5rank.r2{ background:#9AA7B8; } .ovt5rank.r3{ background:#C77B3B; }
    .ovt5nm{ flex:1 1 auto; min-width:0; max-width:6.5em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:var(--fw-strong); font-size:11.5px; }
    .ovt5lab{ flex:1 1 auto; min-width:0; font-size:10.5px; color:var(--muted); font-weight:var(--fw-label); }
    .ovt5dmg{ flex:none; font-size:11px; font-weight:var(--fw-strong); color:var(--muted); font-variant-numeric:tabular-nums; }
    @media(max-width:1400px){ .ovt5box.elembox.e4{ display:none; } }
    @media(max-width:1280px){ .ovt5box.elembox.e3{ display:none; } }
    @media(max-width:1160px){ .ovt5box.elembox.e2{ display:none; } }
    @media(max-width:1050px){ .ovt5box.elembox.e1{ display:none; } }
    @media(max-width:950px){ .ovt5box.elembox.e0{ display:none; } }
    @media(max-width:860px){ .ovtop5{ display:none; } }
    /* ===== 보스 정보(반응형 카드 그리드) ===== */
    .bossgrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(172px,1fr)); gap:10px; }
    .bcard{ border:0; border-radius:var(--r-lg); overflow:hidden; cursor:pointer; transition:box-shadow .12s, transform .12s; background:var(--panel); display:flex; flex-direction:column; box-shadow:var(--sh-1); }
    .bcard:hover{ box-shadow:var(--sh-2); transform:translateY(-2px); }
    .bimgbox{ width:100%; height:clamp(96px,11vw,140px); position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .bimgbox img{ height:88%; width:auto; object-fit:contain; }   /* 높이 기준 통일(보스마다 크기 제각각 방지) */
    /* 검은 칸: 보스별 단계(Ⅰ/Ⅱ/Ⅲ) 타수 + 총 합산 — 이미지칸 우측 오버레이 */
    .bstagebox{ position:absolute; top:5px; right:5px; max-height:66%; display:flex; flex-direction:column; justify-content:flex-start; gap:1px; padding:4px 7px; border-radius:var(--r-sm); background:rgba(255,255,255,.8); font-size:10.5px; font-weight:var(--fw-strong); color:var(--txt); font-variant-numeric:tabular-nums; line-height:1.25; }
    .bsrow{ display:flex; gap:6px; justify-content:space-between; }
    .bsrow b{ color:var(--muted); font-weight:var(--fw-strong); }
    .bstot{ margin-top:3px; border-top:1px solid var(--line); padding-top:2px; text-align:right; }
    .bbar{ height:8px; background:#EDF0F7; position:relative; overflow:hidden; }
    .bbar > i{ display:block; height:100%; }
    .bweakchip{ position:absolute; top:8px; left:8px; color:#fff; font-size:10.5px; font-weight:800; border-radius:var(--r-pill); padding:2px 9px; letter-spacing:0; }
    .bnametag{ position:absolute; left:8px; bottom:8px; font-size:12.5px; font-weight:800; color:var(--txt); background:rgba(255,255,255,.85); border-radius:var(--r-md); padding:3px 9px; letter-spacing:-0.01em; max-width:calc(100% - 16px); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .bhprow{ display:flex; align-items:stretch; border-top:1px solid var(--line); border-bottom:1px solid var(--line); font-weight:var(--fw-strong); }
    .bhprow + .bhprow{ border-top:0; }   /* 사격장 단계별 HP 다단 표시 시 경계선 중복 방지 */
    .blv{ flex:0 0 20%; text-align:center; padding:6px 2px; border-right:1px solid var(--line); font-size:clamp(12px,1.2vw,15px); white-space:nowrap; color:var(--muted); display:flex; align-items:center; justify-content:center; }
    .bhp{ flex:1 1 80%; text-align:center; padding:6px 4px; font-size:clamp(13px,1.35vw,17px); white-space:nowrap; font-variant-numeric:tabular-nums; letter-spacing:-0.01em; }
    .bcoefwrap{ padding:7px 10px 10px; }
    .bcoeftxt{ text-align:center; font-weight:var(--fw-strong); font-size:clamp(12px,1.2vw,15px); font-variant-numeric:tabular-nums; }
    .bcoefbar{ position:relative; height:9px; margin-top:4px; background:rgba(20,30,60,.10); border-radius:var(--r-sm); }
    .bcoefbar > i{ display:block; height:100%; border-radius:var(--r-sm); }
    .bcoefbar::after{ content:''; position:absolute; left:50%; top:-2px; bottom:-2px; width:2px; background:var(--txt); opacity:.55; }  /* 중앙=100% 기준선 */
    .blabel{ color:var(--muted); font-weight:var(--fw-label); font-size:var(--fs-small); }

    /* ===== 스크롤 다운: 헤더 줄 전체 숨김(상단 호버 시 표시), 멤버 열 제목만 상단 고정 ===== */
    #appHeader{ transition:transform .2s ease; }
    body.scrolled:not(.peek) #appHeader{ transform:translateY(-100%); }
    #memberTable .mhead{ position:sticky; top:0; z-index:8; background:var(--panel); box-shadow:var(--sh-1); }
    /* 보스 상세 진입 애니메이션 */
    @keyframes bdIn{ from{ opacity:0; transform:translateY(-10px); } to{ opacity:1; transform:none; } }
    #page-boss.anim .bswitch,#page-boss.anim .bdgrid{ animation:bdIn .28s ease; }

    /* ===== 멤버 순위 ===== */
    #memberTable{ font-size:var(--fs-body); }
    .mentry{ display:flex; flex-wrap:wrap; gap:8px 10px; padding:10px 8px; border:1px solid var(--line); border-radius:12px; background:var(--panel); align-items:stretch; box-shadow:none; margin-bottom:7px; }
    .mentry.mhead{ font-weight:var(--fw-label); color:var(--muted); border-color:transparent; background:transparent; align-items:center; font-size:var(--fs-small); letter-spacing:.01em; padding:7px 8px; border-bottom:1px solid var(--line2); border-radius:0; }
    .mentry.absent{ background:var(--panel2); border-style:dashed; opacity:var(--dim-off); }   /* 미참여(0타) — 회색 점선 */
    .mentry.absent .mleft{ background:transparent; filter:grayscale(1); }
    .mentry.absent .synclv{ color:var(--muted); }
    .absenthead{ margin:10px 2px 6px; padding-top:8px; border-top:1px dashed var(--line2); color:var(--muted); font-size:var(--fs-small); font-weight:var(--fw-label); }
    .mleft{ flex:1 1 36%; min-width:0; display:grid; grid-template-columns:4fr 10fr 12fr 11fr 9fr; align-items:center; gap:4px; border-radius:var(--r-md); padding:5px 2px; }
    .mright{ flex:1 1 58%; min-width:0; display:flex; flex-direction:column; gap:5px; justify-content:center; }
    .cell{ text-align:center; min-width:0; overflow:hidden; }
    .cell.nick{ font-weight:var(--fw-label); white-space:nowrap; text-overflow:ellipsis; font-size:var(--fs-body); }
    .msync{ display:flex; align-items:center; justify-content:center; gap:6px; }
    .msync .bsub{ margin-top:0; text-align:left; }
    .synclv{ font-size:var(--fs-display); font-weight:300; line-height:1.05; letter-spacing:-.03em; font-variant-numeric:tabular-nums; }
    .mtotal{ display:flex; align-items:center; justify-content:center; gap:7px; flex-wrap:wrap; }
    .tdmg{ font-weight:var(--fw-strong); font-size:var(--fs-head); font-variant-numeric:tabular-nums; letter-spacing:-0.01em; }
    .mpct{ display:inline-block; padding:3px 9px; border:0; border-radius:var(--r-pill); background:var(--panel); font-weight:var(--fw-strong); font-size:var(--fs-small); font-variant-numeric:tabular-nums; box-shadow:var(--sh-1); }
    .t{ } .bsub{ color:var(--muted); font-size:var(--fs-small); margin-top:2px; line-height:1.25; }
    .fcount{ color:var(--red); font-weight:var(--fw-strong); }
    .rtop,.rbot{ display:flex; gap:5px; align-items:stretch; }
    .acell{ flex:1 1 0; min-width:0; text-align:center; padding:6px 5px; border-radius:var(--r-sm); color:var(--txt); font-weight:var(--fw-strong); white-space:nowrap; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .acell.bosscell{ flex-direction:column; gap:2px; white-space:normal; min-height:52px; font-size:var(--fs-body); font-weight:var(--fw-label); }
    .acell.empty{ background:var(--panel); color:var(--muted); font-weight:var(--fw-regular); }
    .acell.final{ box-shadow:var(--red-ring-strong); cursor:pointer; }
    .acell.final.odset{ box-shadow:inset 0 0 0 2px var(--od-blue); }   /* 오버딜 입력 끝난 막타칸: 테두리도 빨강→파랑 */
    .tacell{ flex:1 1 0; min-width:0; text-align:center; padding:6px 6px; border-radius:var(--r-sm); color:var(--txt); font-weight:var(--fw-strong); display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; }
    .tacell.final{ box-shadow:var(--red-ring-strong); cursor:pointer; }
    .tacell.final.odset{ box-shadow:inset 0 0 0 2px var(--od-blue); }
    .over{ color:var(--accent); font-weight:var(--fw-label); font-size:var(--fs-small); }
    .odon{ color:var(--od-blue); font-weight:var(--fw-strong); }   /* 오버딜 반영된 딜량(파란색) */
    .odmiss{ color:var(--red); font-weight:var(--fw-strong); }   /* 막타 오버딜 미기입(빨강) — 0 기입과 구분 */
    .finaldmg{ color:var(--red); font-weight:var(--fw-strong); }   /* 보스별 개별 막타 딜량(빨강·막타 식별) */
    .combo{ flex:1 1 0; min-width:0; border-radius:var(--r-sm); padding:4px; display:flex; align-items:center; justify-content:center; }
    .bn{ font-weight:var(--fw-label); }
    .squad{ display:flex; gap:3px; justify-content:center; flex-wrap:wrap; }
    .squad img{ width:clamp(27px,4.7vw,39px); height:clamp(27px,4.7vw,39px); border-radius:var(--r-sm); object-fit:cover; background:var(--line); }
    .squad .ph{ width:clamp(27px,4.7vw,39px); height:clamp(27px,4.7vw,39px); border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--panel); font-weight:var(--fw-strong); background:var(--ph); }
    .squad .nikesel,.expfiltercombo .nikesel{ outline:2px solid var(--accent); outline-offset:2px; box-shadow:var(--accent-glow-strong); opacity:1; filter:none; }
    .squad .nidis{ opacity:var(--dim-off); filter:grayscale(1); cursor:not-allowed!important; box-shadow:var(--sh-none)!important; outline:0!important; }
    .bossSquadOnly{ width:100%; display:flex; justify-content:center; }
    .bossSquadOnly.multi{ flex-direction:column; align-items:center; gap:4px; }   /* 같은 보스 2타: 스쿼드 위아래 스택 */
    .acdmg{ display:flex; flex-direction:column; align-items:center; line-height:1.1; }   /* 같은 보스 2타: 합산(위) + 개별(아래) */
    .acsplit{ font-size:.78em; color:var(--muted); font-weight:var(--fw-label); font-variant-numeric:tabular-nums; }
    .bossSquadOnly .squad{ gap:3px; flex-wrap:nowrap; }
    .bossSquadOnly .squad img,.bossSquadOnly .squad .ph{ width:clamp(24px,2.6vw,34px); height:clamp(24px,2.6vw,34px); border-radius:var(--r-sm); font-size:10px; }
    @media(max-width:760px){ .mentry.mhead{ display:none; } }

    /* ===== 보스 상세 ===== */
    .bswitch{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin-bottom:14px; align-items:center; }
    .bswitch button{ position:relative; overflow:hidden; border:1px solid var(--line); border-radius:var(--r-lg); cursor:pointer; padding:0; height:clamp(56px,7vw,84px); display:flex; align-items:center; justify-content:center; transition:height .25s ease, box-shadow .15s, transform .12s; }
    .bswitch button:hover{ transform:translateY(-2px); box-shadow:var(--sh-2); }
    .bswitch button .bg{ position:absolute; inset:0; background-size:cover; background-position:center; opacity:.32; transition:opacity .2s; }
    .bswitch button .lbl{ position:relative; z-index:1; font-weight:var(--fw-strong); font-size:clamp(15px,1.6vw,21px); color:var(--txt); text-shadow:0 1px 2px rgba(255,255,255,.65); }
    .bswitch button.active{ box-shadow:var(--accent-ring); background:var(--accent-soft); }   /* 선택 표시(높이 동일) */
    .bswitch button.active .bg{ opacity:.5; }
    /* 뒤로가기(고정·흰 패널 바깥 좌측 거터) */

function fmtDmg(v){ v=Number(v)||0; var a=Math.abs(v); if(a>=1e12) return (v/1e12).toFixed(2)+'조'; if(a>=1e8) return Math.round(v/1e8).toLocaleString()+'억'; return Math.round(v).toLocaleString(); }

function metricBg(v){ v=Number(v)||0; if(v>=150) return 'rgba(150,80,235,.13)'; if(v>=100) return 'rgba(55,110,240,.12)'; if(v>=51) return 'rgba(55,195,110,.15)'; return 'rgba(235,185,55,.18)'; }

function syncGrowthBg(delta){ var d=Number(delta)||0; if(d<=10) return PAS4[0]; if(d<=20) return PAS4[1]; if(d<=30) return PAS4[2]; return PAS4[3]; }   // 구간당 싱크로 성장(기록 없으면 0=노랑)

function quantile_(sorted,q){ if(!sorted.length) return 0; var pos=(sorted.length-1)*q, b=Math.floor(pos), r=pos-b; return sorted[b+1]!==undefined?(sorted[b]+r*(sorted[b+1]-sorted[b])):sorted[b]; }
function dmgRowBgQ(v,q1,q3){ v=Number(v)||0; if(v>=q3) return 'rgba(150,80,235,.13)'; if(v>=q1) return 'rgba(55,110,240,.12)'; return 'rgba(55,195,110,.15)'; }
function bil(v){ return Math.round((Number(v)||0)/1e8); }

function el(id){ return document.getElementById(id); }
// pako 로드 여부 → 서버에 알려서 가능할 때만 압축시킴(없으면 비압축으로 안전하게 동작)
function gzOk(){ return (window.pako && pako.ungzip) ? 1 : 0; }
// 서버가 압축({__gz:base64})으로 보낸 응답을 해제. 비압축이면 그대로.
function unpack(res){
  if(res && res.__gz){
    try{ var b=atob(res.__gz), u=new Uint8Array(b.length); for(var i=0;i<b.length;i++) u[i]=b.charCodeAt(i); return JSON.parse(pako.ungzip(u,{to:'string'})); }
    catch(e){ console.error('unpack 실패',e); return { ok:false, error:'압축 해제 실패(새로고침)' }; }
  }
  return res;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
/* 배포 확인용 빌드 태그: 콘솔에 이 줄이 안 보이면 옛 버전이 배포돼 있는 것(새 버전 배포 필요). */
var BUILD='2026-06-19b round18 (+boss-combo-tree-sort+scatter-highlight, alias-live-dup-comma+detail-below)';
try{ console.log('%c[유레 빌드] '+BUILD,'color:#3a8fe8;font-weight:bold'); }catch(e){}
/* ===== 로딩 타이밍 로그 =====
   각 google.script.run 호출의 왕복(클라 체감) + 서버가 _t로 실어보낸 구간별 시간을 브라우저 콘솔에 출력.
   기본 ON. URL에 ?perf=0 또는 콘솔에서 PERF.on=false 로 끔. 어디서 느린지 = 어떤 호출이 큰지 + 그 안 어디(_t marks)인지로 파악. */
var PERF={ on: (location.search.indexOf('perf=0')<0) };
function _pnow(){ return (window.performance&&performance.now)?performance.now():Date.now(); }
function fmtT_(t){ if(!t) return ''; var m=(t.marks||[]).map(function(x){return x[0]+' '+x[1];}).join(', '); return '서버 '+t.total+'ms'+(t.hit?(' ['+t.hit+']'):'')+(t.build?(' <'+t.build+'>'):'')+(m?(' { '+m+' }'):''); }
// 성공 핸들러 래퍼: 호출 직전 t0 → 응답(왕복=네트워크+서버) + cb(렌더) 시간을 한 줄로 출력.
//  → 느림이 서버/네트워크(왕복)인지 클라 렌더인지, 서버 안 어디(_t marks)인지 구분 가능.
function perfCb(label, cb){
  var t0=_pnow();
  return function(res){
    var t1=_pnow();                       // 응답 도착 = 왕복 끝
    try{ return cb(res); }
    finally{ if(PERF.on){ try{
      var t2=_pnow(), line='⏱ '+label+': 왕복 '+(t1-t0).toFixed(0)+'ms';
      if(res&&res._t) line+=' ← '+fmtT_(res._t);
      if(res&&res.ov&&res.ov._t) line+=' | overview '+fmtT_(res.ov._t);   // 부트스트랩: 내부 개요 세부
      line+='  · 렌더 '+(t2-t1).toFixed(0)+'ms';
      console.log(line);
    }catch(e){} } }
  };
}
function jsq(s){ return esc(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }   // 백슬래시 먼저 이스케이프(인라인 onclick 저장형 XSS 차단), 그다음 작은따옴표

function imgFromFile(file){ var mt=state.meta; if(!mt||!mt.imgBase||!file) return ''; return mt.imgBase+'si_'+file+'_00_s.png'; }   // dataNik.csv 파일명(c###)으로 직접 이미지

// 막타(오버딜 대상) 딜량 색: 오버딜>0=파랑(odon) / 미기입=빨강(odmiss) / 0 기입=무색. 비막타=무색(오버딜은 막타에만).

}
function txtOn(hex){ var c=String(hex||'').replace('#',''); if(c.length===3) c=c.split('').map(function(x){return x+x;}).join(''); var r=parseInt(c.substr(0,2),16)||0,g=parseInt(c.substr(2,2),16)||0,b=parseInt(c.substr(4,2),16)||0; return (0.299*r+0.587*g+0.114*b)>150?'#13182a':'#ffffff'; }
function pastel(hex){ var c=String(hex||'').replace('#',''); if(c.length===3) c=c.split('').map(function(x){return x+x;}).join(''); var r=parseInt(c.substr(0,2),16)||200,g=parseInt(c.substr(2,2),16)||200,b=parseInt(c.substr(4,2),16)||200; function mx(x){return Math.round(x+(255-x)*0.80);} return 'rgb('+mx(r)+','+mx(g)+','+mx(b)+')'; }
function weakColorOf(boss){ var b=(state.ov.bosses.filter(function(x){return x.name===boss;})[0]||{}); return b.weakColor||'#888'; }
function elemColorJs(n){ return ({'작열':'#e8503a','수냉':'#3a8fe8','풍압':'#3ac06b','전격':'#9b59e8','철갑':'#e8b73a'})[n]||'#888888'; }
var ELEMENTS=['작열','풍압','수냉','전격','철갑'];   // 게임 표준 속성 순서(작열·풍압·수냉·전격·철갑) — 정렬/필터 기준

function elemCanonIndex_(code){ var i=ELEMENTS.indexOf(code); return i<0?99:i; }   // 속성 표준 순서 인덱스(없으면 맨 뒤)
function elementChoiceHtml_(opt){
  opt=opt||{};
  if(opt.multi){
    return '<div class="epick-multi">'+ELEMENTS.map(function(c){
      var on=!!(opt.selected&&opt.selected[c]);
      return '<button class="'+(on?'on':'off')+'" style="background:'+pastel(elemColorJs(c))+'" onclick="'+opt.toggle+'(\''+c+'\')">'+c+'</button>';
    }).join('')+'</div>';
  }
  var cur=opt.selected||'', col=elemColorJs(cur), others=ELEMENTS.filter(function(c){return c!==cur;});
  return '<div class="epick" id="'+opt.id+'">'+

  var pd=m.perBossDetail||{};
  return list.every(function(n){ return !!pd[n]; });
}
// 선택된 니케 중 하나라도 든 스쿼드인가(필터 없으면 항상 true). 해당 니케 없는 '조합'은 화면에서 숨긴다.
function squadHasSel_(sq){
  var sel=state.squadFilter||[]; if(!sel.length) return true;
  return (sq||[]).some(function(c){ return sel.indexOf(c.name||('?'+c.tid))>=0; });
}
function memberHasAnyNike_(m){
  var sel=state.squadFilter||[]; if(!sel.length) return true;
  // 1타든 2타든 — 그 멤버의 모든 타격 스쿼드를 검사(perBossDetail은 대표 1개만 가져 누락됨)

function ovSortBy(key){

function showPage(p){

  el('page-boss').style.display=(p==='boss')?'':'none';
  el('page-practice').style.display=(p==='practice')?'':'none';

  if(p==='practice'){ var recBtn=document.querySelector('#practiceTabs .ptab[data-ptab="record"]'); if(recBtn) recBtn.style.display=state.ssr?'none':''; if(state.ssr&&state.pTab==='record') state.pTab='exp'; }
  if(p==='practice' && (!state.practice || state.practice.season!==state.season)){
    if(state.prefetching && state.prefetchSeason===state.season) el('practiceTable').innerHTML='<div class="muted">미리 불러오는 중…</div>';
    else loadPracticeData(state.season);
  } else if(p==='practice'){ if(state.ssr) setPTab(state.pTab); else renderPracticeTable(); }
  if(p==='analysis' && (!state.analysis || state.analysis.coefMode!==state.coefMode)){
    if(state.prefetching) el('anTable').innerHTML='<div class="muted" style="padding:12px 4px">미리 불러오는 중…</div>';
    else loadAnalysis();
  } else if(p==='analysis'){ fillAnTargetList(); renderAnMetric(); renderAnalysis(); }
  if(p==='overview' && !state.ssr && (!state.ov || state.ov.season!==state.season || state.ov.coefMode!==state.coefMode || state.overviewDirty)) loadOverview(state.season,!!state.overviewDirty);
  if(p==='overview' && state.ssr && state.practice) applyOverview(buildSsrOverview_());   // 사격장: 열 때마다 최신 기록으로 합성 개요 재구성
  if(p==='options') renderOptions();
}
/* 모의전 내부 탭(파일 인덱스) 전환 */
function setPTab(t){
  if(state.ssr && t==='record') t='exp';   // 사격장: 모의전 기록 탭 없음
  state.pTab=t;
  ['record','exp','tetris'].forEach(function(k){ var e=el('ptab-'+k); if(e) e.style.display=(k===t)?'':'none'; });
  document.querySelectorAll('#practiceTabs .ptab').forEach(function(b){ b.classList.toggle('active', b.dataset.ptab===t); });
  if(t==='exp'){ if(!state.exp || state.exp.season!==state.season) loadExpData(state.season); else renderExpTab(); }

function isModalOpen(){ return ['odModal','pModal','tjsonModal'].some(function(id){ var m=el(id); return m && m.style.display==='flex'; }); }
/* 새로고침: 입력 즉시 reload하지 않고, 이 버튼 또는 5분 주기로만 시트에서 다시 집계해 가져온다(서버 캐시로 가벼움). */
function refreshCurrent(manual){
  if(!state.season) return;

  if(!manual && isModalOpen()) return;   // 자동 주기는 편집 중이면 건너뜀
  if(state.ssr){ loadPracticeData(SSR_SEASON, function(){ ssrOverrideBosses_(); applyOverview(buildSsrOverview_()); ssrApplyPracticeUI_(); }); markSync(); return; }   // 사격장: 서버 개요 없음 — 기록 재로드 후 합성 개요 재구성(블랭크 없이)
  if(el('page-practice').style.display!=='none'){ state.overviewDirty=true; loadPracticeData(state.season); }
  else if(el('page-analysis').style.display!=='none'){ loadAnalysis(); loadOverview(state.season,true); }
  else {
    loadOverview(state.season,true);
    if(el('page-boss').style.display!=='none' && state.boss){
      google.script.run.withSuccessHandler(perfCb('bossDetail(refresh)', function(res){ var bd=unpack(res); if(bd&&bd.ok){ state.bossData=bd; if(bd.meta) state.meta=bd.meta; renderScatter(bd); renderBossTable(bd); renderBossComboTree(bd); } })).getBossDetail(state.season, state.boss, gzOk());
    }
  }
  markSync();
}
function markSync(){ var e=el('lastSync'); if(e){ var d=new Date(); e.textContent='업데이트 '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); } }
setInterval(function(){ refreshCurrent(false); }, 300000);   // 5분 자동
// 스크롤 다운하면 헤더 줄 숨김(열 제목만 상단 고정). 맨 위 호버 시 헤더 표시(peek).
function onScrollCollapse(){ document.body.classList.toggle('scrolled', (window.scrollY||document.documentElement.scrollTop||0)>40); }
window.addEventListener('scroll', onScrollCollapse, {passive:true});
document.addEventListener('mousemove', function(e){ if(e.clientY<12) document.body.classList.add('peek'); else if(e.clientY>90) document.body.classList.remove('peek'); });
document.querySelectorAll('nav button').forEach(function(b){
  b.addEventListener('click',function(){
    if(b.disabled) return;
    showPage(b.dataset.page);   // 보스 상세는 네비 탭 없이 개요의 보스 카드 클릭으로만 진입
  });
});

/* 부트스트랩: 시즌목록 + 초기 개요. 서버가 HTML에 인라인(BOOT0)했으면 **왕복 0회**로 즉시 렌더, 없으면 round-trip 폴백. */
function handleBootstrap(res){
  var sel=el('seasonSel');
  if(!sel.options.length){
    (res.seasons||[]).forEach(function(s){ var o=document.createElement('option'); o.value=s; o.textContent=s+'차'; sel.appendChild(o); });
    var ossr=document.createElement('option'); ossr.value='ssr'; ossr.textContent='유니온 사격장'; sel.insertBefore(ossr,sel.firstChild);   // 시즌 최상단: 테스트 모드(빅 암즈)

  }
  if(!sel._bound){ sel._bound=1; sel.addEventListener('change',function(){
    state.bossData=null; state.practice=null; state.exp=null; state.tetris=null;
    state.squadFilter=[]; state.bossFilter=[]; state.pBossFilter={}; state.sortKey=null; state.sortDir=null; state.anSortSeason=null; state.anSortDir=null;   // 차수 바뀌면 정렬·필터 초기화
    var v=sel.value;
    if(v==='ssr'){ enterShootingRange_(); return; }

    state.ssr=false; ssrApplyPracticeUI_();
    var s=Number(v); loadOverview(s); if(el('page-practice').style.display!=='none') loadPracticeData(s);
  }); }
  var init=Number(res.season)||Number(SEASON0)||(res.seasons&&res.seasons[0]);
  if(init){
    sel.value=init; state.season=init; updateOverviewLabel();
    var ov=res.ov?unpack(res.ov):null;
    if(ov&&ov.ok) applyOverview(ov);     // 번들된 개요 즉시 렌더(추가 round-trip 없음)
    else loadOverview(init);             // 폴백: 개요만 따로 요청(인라인 해제 실패 등)
    setTimeout(startPrefetch_,0);
  }
}
if(BOOT0 && BOOT0.ok){                    // 인라인 경로(왕복 0회)
  var _bt0=_pnow();
  handleBootstrap(BOOT0);
  if(PERF.on){ try{ var ovt=BOOT0.ov&&BOOT0.ov._t; console.log('⏱ bootstrap(인라인·왕복0): 렌더 '+(_pnow()-_bt0).toFixed(0)+'ms'+(BOOT0._t?('  ← doGet '+fmtT_(BOOT0._t)):'')+(ovt?('  | overview '+fmtT_(ovt)):'')); }catch(e){} }
} else {                                   // 폴백: 서버 호출
  google.script.run.withSuccessHandler(perfCb('bootstrap', handleBootstrap)).withFailureHandler(function(e){ alert('초기 로드 실패: '+e.message); }).getBootstrap(SEASON0, state.coefMode, gzOk());
}

/* ===== 운영자 권한(옵션 잠금) — ADMIN_KEY(Code.gs) 설정 시 옵션 탭을 일반 유저에게 숨기고 키 입력으로만 연다. 재로드 없이 in-place 토글. ===== */
function adminKey_(){ try{ return localStorage.getItem('ureAdminKey')||''; }catch(e){ return ''; } }
function applyAdminUI_(){
  var show=(state.isAdmin || !state.adminReq);
  var optBtn=document.querySelector('nav button[data-page="options"]'); if(optBtn) optBtn.style.display=show?'':'none';
  var lk=el('adminBtn');
  if(lk){
    if(!state.adminReq) lk.style.display='none';   // 잠금 미설정이면 버튼 자체 숨김(종전 UI)
    else { lk.style.display=''; lk.textContent=state.isAdmin?'🔓 운영자':'🔒 운영자'; lk.title=state.isAdmin?'운영자 모드 — 클릭하면 잠금':'운영자 키 입력(옵션 잠금 해제)'; }
  }
  if(!show && el('page-options') && el('page-options').style.display!=='none') showPage('overview');   // 비운영자가 옵션에 있으면 개요로
}
function adminToggle_(){
  if(state.isAdmin){ try{ localStorage.removeItem('ureAdminKey'); }catch(e){} state.isAdmin=false; applyAdminUI_(); return; }   // 잠금(키 제거)
  var key=prompt('운영자 키를 입력하세요 (옵션·멤버관리 잠금 해제).'); if(key==null) return;
  google.script.run.withSuccessHandler(function(res){
    if(res&&res.valid){ try{ localStorage.setItem('ureAdminKey',key); }catch(e){} state.isAdmin=true; applyAdminUI_(); showPage('options'); }
    else alert('운영자 키가 일치하지 않습니다.');
  }).withFailureHandler(function(e){ alert('확인 실패: '+e.message); }).verifyAdminKey(key);
}
function initAdmin_(){
  state.adminReq=(typeof ADMINREQ0!=='undefined' && ADMINREQ0==='1');
  state.isAdmin=!state.adminReq;   // 잠금 미설정이면 전원 옵션 사용 가능(종전 동작)
  if(state.adminReq){
    var k=adminKey_();
    if(k){ google.script.run.withSuccessHandler(function(res){ if(res&&res.valid) state.isAdmin=true; applyAdminUI_(); }).withFailureHandler(function(){ applyAdminUI_(); }).verifyAdminKey(k); }
  }
  applyAdminUI_();
}
initAdmin_();

function updateOverviewLabel(){ var b=el('navOverview'); if(b) b.textContent=state.ssr?'유니온 사격장':((state.season?state.season+'차 ':'')+'유레 개요'); }
function overviewKey_(season,mode){ return Number(season)+'|'+(mode||'auto'); }
function cacheOverview_(ov,mode){ if(ov&&ov.ok) state.overviewCache[overviewKey_(ov.season,mode||ov.coefMode)]=ov; }
function dropOverview_(season,mode){
  if(mode){ delete state.overviewCache[overviewKey_(season,mode)]; return; }
  var p=Number(season)+'|'; Object.keys(state.overviewCache).forEach(function(k){ if(k.indexOf(p)===0) delete state.overviewCache[k]; });
}
// 개요 객체(이미 unpack됨)를 화면에 반영 — 일반 로드와 부트스트랩(번들 개요)이 공유.
function applyOverview(ov){
  if(!ov||!ov.ok){ el('memberTable').innerHTML='<div class="muted">'+esc((ov&&ov.error)||'불러오기 실패')+'</div>'; el('bossInfo').innerHTML=''; if(el('ovHero')) el('ovHero').style.display='none'; return; }
  ssrCaptureHp_(ov);   // 실제 차수 개요에서 빅 암즈 HP 원천 확보
  if(ov.ssr){           // 유니온 사격장: 합성 개요(캐시 안 함, 토글 숨김)
    state.ov=ov; state.overviewDirty=false; state.meta=ov.meta||state.meta; state.ovr={}; state.ovrSet={};
    ssrHideToggles_(true); if(el('ovHero')) el('ovHero').style.display='none';
    renderBossInfo(); renderMembers(); setTimeout(onScrollCollapse,0); markSync();
    if(state.pTab==='tetris' && el('page-practice').style.display!=='none') renderTetris();
    return;
  }
  ssrHideToggles_(false);
  cacheOverview_(ov,ov.coefMode||state.coefMode);
  state.ov=ov; state.overviewDirty=false; state.meta=ov.meta; state.ovr={}; state.ovrSet={};
  (ov.overrides||[]).forEach(function(o){ var k=ovrKey(o.boss,o.nickname); state.ovr[k]=o.overdamage; state.ovrSet[k]=true; });   // ovrSet=오버딜 기입 여부(0 기입도 포함) — 미기입 막타 빨강 표시용
  renderMetricToggle(); renderViewToggle(); renderBossCellToggle(); renderOvHero(); renderBossInfo(); renderMembers(); setTimeout(onScrollCollapse,0); markSync();
  if(state.pTab==='tetris' && el('page-practice').style.display!=='none') renderTetris();
}
function loadOverview(season,force){
  state.season=season; updateOverviewLabel();
  var mode=state.coefMode, cached=!force&&state.overviewCache[overviewKey_(season,mode)];
  if(cached){ applyOverview(cached); return; }
  if(!state.ov || state.ov.season!==Number(season)) el('memberTable').innerHTML='<div class="muted">불러오는 중…</div>';   // 같은 차수 새로고침은 기존 화면 유지(블랭크 X) → 조용히 교체
  google.script.run.withSuccessHandler(perfCb('overview', function(res){
    var ov=unpack(res); cacheOverview_(ov,mode);
    if(state.season===Number(season)&&state.coefMode===mode) applyOverview(ov);
  })).withFailureHandler(function(e){ if(state.season===Number(season)&&state.coefMode===mode) el('memberTable').innerHTML='<div class="muted">오류: '+esc(e.message)+'</div>'; }).getOverview(season, mode, gzOk());
}

function applyMembersData_(r){
  state._memLoading=false;
  state._latestSeason=(r&&r.latestSeason)||0;
  state._rosterCount=(r&&r.rosterCount)||0;
  state._rosterAt=(r&&r.rosterAt)||0;
  state.memEdit=((r&&r.members)||[]).map(function(m){ return { openid:m.openid, nick:m.nick, lastSeason:m.lastSeason, fromRaw:m.fromRaw, fromRoster:m.fromRoster, inRoster:m.inRoster, analysisIncluded:m.analysisIncluded, manual:m.manual, status:m.status, mergedInto:m.mergedInto }; });
}
function prefetchFallback_(){
  if(el('page-practice').style.display!=='none' && (!state.practice||state.practice.season!==state.season)) loadPracticeData(state.season);
  if(el('page-analysis').style.display!=='none' && (!state.analysis||state.analysis.coefMode!==state.coefMode)) loadAnalysis();
  if(el('page-options').style.display!=='none') renderOptions();
}
function startPrefetch_(){
  if(state.prefetchStarted||!state.season) return;
  state.prefetchStarted=true; state.prefetching=true; state.prefetchSeason=state.season;
  var epoch=state.viewEpoch;
  google.script.run.withSuccessHandler(perfCb('prefetch',function(res){
    var b=unpack(res); state.prefetching=false;
    if(!b||!b.ok){ prefetchFallback_(); return; }
    if(epoch===state.viewEpoch) Object.keys(b.overviews||{}).forEach(function(s){ cacheOverview_(b.overviews[s],b.coefMode); });
    if(state.season===b.season && (!state.practice||state.practice.season!==b.season) && b.practice&&b.practice.ok) applyPracticeData_(b.practice,false);
    if(epoch===state.viewEpoch && (!state.analysis||state.analysis.coefMode!==b.coefMode) && b.analysis&&b.analysis.ok) applyAnalysisData_(b.analysis,b.coefMode,false);
    if(!state.memEdit && b.members&&b.members.ok) applyMembersData_(b.members);
    if(el('page-practice').style.display!=='none' && state.practice&&state.practice.season===state.season) renderPracticeTable();
    if(el('page-analysis').style.display!=='none' && state.analysis&&state.analysis.coefMode===state.coefMode){ fillAnTargetList(); renderAnMetric(); renderAnalysis(); }
    if(el('page-options').style.display!=='none') renderOptions();
    prefetchFallback_();
  })).withFailureHandler(function(){ state.prefetching=false; prefetchFallback_(); }).getPrefetchBundle(state.season,state.coefMode,gzOk());
}

/* ===== 전황 히어로: 전체 숫자만(사용 타수·총 딜량·참여). 보스별 진행도는 보스 카드가 유일한 소스 ===== */
function renderOvHero(){
  var h=el('ovHero'), ov=state.ov;
  if(!h) return;
  if(!ov||!ov.members||!ov.members.length){ h.style.display='none'; return; }
  var tot=0; ov.members.forEach(function(m){ tot+=m.totalDamage||0; });
  var hits=(ov.meta&&ov.meta.totalHits)||0, maxHits=ov.members.length*3;
  var absent=(ov.nonParticipants&&ov.nonParticipants.length)||0;
  h.style.display='';
  h.innerHTML='<div class="ovhero-in">'+
    '<div><div class="ovhero-k">시즌 '+esc(String(state.season||''))+' · 유니온 레이드</div>'+
    '<div class="ovhero-num">'+fmtDmg(tot)+'<span class="ovhero-sub">총 딜량</span></div></div>'+
    '<div class="ovhero-stats">'+
      '<div><div class="ovhero-k">사용 타수</div><div class="ovhero-v">'+hits+' / '+maxHits+'</div></div>'+
      '<div><div class="ovhero-k">참여</div><div class="ovhero-v">'+ov.members.length+'명</div></div>'+
      (absent?'<div><div class="ovhero-k">미참여</div><div class="ovhero-v">'+absent+'명</div></div>':'')+
    '</div>'+ovTop5Html_(ov.members,tot)+'</div>';
}
// 상단 통계 — ① 전체 딜량 통계(최고/평균/최저, 멤버 총딜 기준) 1칸 ② 속성별 개별 타수 딜량 통계(최고/평균/최저) 5칸. 좁아지면 속성칸 우측부터, 마지막에 전체칸이 사라짐.
function statTrio_(arr){
  if(!arr||!arr.length) return null;
  var mx=-Infinity, mn=Infinity, sum=0;
  arr.forEach(function(v){ v=Number(v)||0; if(v>mx) mx=v; if(v<mn) mn=v; sum+=v; });
  return {max:mx, min:mn, avg:sum/arr.length, n:arr.length};
}
function ovStatRows_(s){
  if(!s) return '<div class="ovt5e muted">·</div>';
  return '<div class="ovt5e"><span class="ovt5lab">최고</span><span class="ovt5dmg">'+fmtDmg(s.max)+'</span></div>'+
         '<div class="ovt5e"><span class="ovt5lab">평균</span><span class="ovt5dmg">'+fmtDmg(s.avg)+'</span></div>'+
         '<div class="ovt5e"><span class="ovt5lab">최저</span><span class="ovt5dmg">'+fmtDmg(s.min)+'</span></div>';
}
function ovTop5Html_(members,tot){
  if(!members||!members.length) return '';
  // ① 전체 딜량 통계(멤버 총딜 기준)
  var totals=members.map(function(m){ return Number(m.totalDamage)||0; }).filter(function(v){ return v>0; });
  var totalBox='<div class="ovt5box rankbox"><div class="ovt5hd">전체 딜량</div>'+ovStatRows_(statTrio_(totals))+'</div>';
  // ② 속성별 개별 타수 딜량 통계 (보스 속성 순)
  var bosses=(state.ov&&state.ov.bosses)||[], elemOrder=[], colorBy={}, bossElem={}, seen={};
  bosses.forEach(function(b){ bossElem[b.name]=b.weak; if(b.weak&&!seen[b.weak]){ seen[b.weak]=1; elemOrder.push(b.weak); colorBy[b.weak]=b.weakColor; } });
  var hitsByElem={}; elemOrder.forEach(function(e){ hitsByElem[e]=[]; });
  members.forEach(function(m){ (m.hits||[]).forEach(function(h){ var e=bossElem[h.boss], d=Number(h.damage)||0; if(e&&hitsByElem[e]&&d>0) hitsByElem[e].push(d); }); });
  var elemBoxes=elemOrder.map(function(e,ei){
    var col=colorBy[e]||'#888';
    return '<div class="ovt5box elembox e'+ei+'" style="border-top:2px solid '+col+'"><div class="ovt5hd" style="color:'+col+'">'+esc(e)+'</div>'+ovStatRows_(statTrio_(hitsByElem[e]))+'</div>';
  }).join('');
  return '<div class="ovtop5">'+totalBox+elemBoxes+'</div>';
}

/* ===== 보스 정보 카드 (상단 속성색 이미지칸 + 막대바 + Lv·HP + 난이도계수) ===== */
// 보스별 단계(level) 타수 집계 — 멤버 hits의 level로 카운트(서버 변경 불필요).
function roman_(n){ var R=['','Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ']; return R[n]||(''+n); }
function ovBossStageCounts_(){
  var out={};
  ((state.ov&&state.ov.members)||[]).forEach(function(m){ (m.hits||[]).forEach(function(h){
    var b=h.boss, lv=Number(h.level)||0; if(!b||!lv) return;
    (out[b]||(out[b]={}))[lv]=(out[b][lv]||0)+1;
  }); });
  return out;
}
function ovStageBoxHtml_(sc){   // 검은 칸: 1단/2단/3단 타수 + 총 합산 공격횟수
  if(!sc) return '';
  var lvs=Object.keys(sc).map(Number).sort(function(a,b){return a-b;}), tot=0;
  if(!lvs.length) return '';
  var rows=lvs.map(function(l){ tot+=sc[l]; return '<span class="bsrow"><b>'+roman_(l)+'</b>'+sc[l]+'</span>'; }).join('');
  return '<div class="bstagebox">'+rows+'<span class="bstot">'+tot+'</span></div>';
}
/* ===== 유니온 사격장(테스트 모드) =====
   - 시즌 드롭다운 최상단 '유니온 사격장'. 보스는 5속성 「빅 암즈(Armstrong)」(같은 보스, 약점 코드만 다름), HP=최신 레이드 단계별 최대치, 난이도계수 100%.
   - 개요: 총합딜=5속성 best 1타 합, '평균 등수'=기록한 속성별 딜 등수 평균(미기록 제외). 정렬=총합딜만.
   - 데이터는 조합실험으로 입력하고 Practice 시트(SSR_SEASON)에 저장(길드 공유). 세트마다 싱크로 레벨 기입(같은 닉도 세트별로 다를 수 있음). */
function ssrCaptureHp_(ov){
  if(!ov||ov.ssr||!ov.bosses) return;
  var season=Number(ov.season)||0;
  // step별로 '가장 단계가 많은(=완전한)' HP 배열을 채택, 같은 깊이면 최신 차수 우선.
  //  ⚠️ 진행 중 차수는 GetUnionRaidLevelInfo가 현재 단계 HP만 줘서 1단계뿐인 얕은 배열이 됨.
  //     단순히 '최신 차수'만 보면 이 얕은 배열이 완전한 과거 차수를 덮어 보스가 '최대 체력 1단계만' 되어버림 → 깊이 우선으로 방지.
  ov.bosses.forEach(function(b){
    if(!b.step||!b.hpByPhase||!b.hpByPhase.length) return;
    var hp=b.hpByPhase.map(Number);
    if(!hp.some(function(v){return v>0;})) return;   // 빈 차수 플레이스홀더([0,0,0] 등) 무시
    var cur=ssrHpSrc_.byStep[b.step], curN=cur?cur.length:0, curS=ssrHpSrc_.srcSeason[b.step]||0;
    if(hp.length>curN || (hp.length===curN && season>=curS)){ ssrHpSrc_.byStep[b.step]=hp; ssrHpSrc_.srcSeason[b.step]=season; }
  });
  if(season>ssrHpSrc_.season) ssrHpSrc_.season=season;
}
function ssrHpForStep_(step){
  var h=ssrHpSrc_.byStep[step];
  if(h&&h.length) return h.slice();
  return [1000e8, 2500e8, 5000e8];   // 폴백(실제 개요를 한 번도 못 봤을 때) — 임의값(최신 레이드 규모)
}
function ssrBosses_(){
  return ELEMENTS.map(function(code,i){
    var step=i+1, hp=ssrHpForStep_(step), maxHp=hp.length?Number(hp[hp.length-1])||0:0;
    return { step:step, name:'빅 암즈', weak:code, weakColor:elemColorJs(code), img:'Enemy_Armstrong.webp',
      hpCum:hp, hpByPhase:hp, maxHp:maxHp, phaseMax:hp.length?(Number(hp[0])||0):0, phase:1,
      phaseRemain:hp.length?(Number(hp[0])||0):0, phase4Damage:0, unlimited:false, coef:1, coefAuto:1, cumDamage:0 };
  });
}
// state.practice.bosses를 빅 암즈로 덮어쓴다(테트리스/조합실험이 보스 HP·약점을 이걸로 씀).
function ssrOverrideBosses_(){
  if(!state.practice) return;
  state.practice.bosses=ssrBosses_().map(function(b){ return { step:b.step, name:b.name, weak:b.weak, weakColor:b.weakColor, img:b.img, hpCum:b.hpCum, maxHp:b.maxHp }; });
}
// 합성 개요: 조합실험(Practice extended) 1타 기록 → 멤버별 속성(step)별 best 딜 → 총합딜 + 평균등수.
function buildSsrOverview_(){
  var pr=state.practice||{}, bosses=ssrBosses_(), rows=[];
  (pr.members||[]).forEach(function(m){
    var best={}, d=m.data||{};   // step -> {damage,combo,syncLv}
    (d.extended||[]).forEach(function(set){
      var sync=Number(set.syncLv)||Number(m.syncLv)||0;
      (set.attacks||[]).forEach(function(a){
        var step=Number(a.boss)||0, dmg=Number(a.damage)||0; if(!step||dmg<=0) return;
        if(!best[step]||dmg>best[step].damage) best[step]={damage:dmg,combo:a.combo||'',syncLv:sync};
      });
    });
    var steps=Object.keys(best).map(Number); if(!steps.length) return;
    var total=0, maxSync=0; steps.forEach(function(s){ total+=best[s].damage; maxSync=Math.max(maxSync,best[s].syncLv); });
    // ⚠️ hits/perBossDetail를 넣지 않는다 — 사격장 기록은 '계획'이지 실제 공격이 아니므로 테트리스가 실측으로 오인하면 안 됨(actual.count=0 유지).
    rows.push({nickname:m.nickname, syncLv:maxSync, totalDamage:total, best:best, hits:[], contrib:0, share:0, avgRank:null});
  });
  // 평균 등수: 각 step(속성)별 best 딜 내림차순 등수 → 멤버별 기록한 속성 등수 평균.
  bosses.forEach(function(b){
    var withRec=rows.filter(function(r){return r.best[b.step];}).sort(function(x,y){return y.best[b.step].damage-x.best[b.step].damage;});
    withRec.forEach(function(r,i){ r.best[b.step].rank=i+1; });
  });
  rows.forEach(function(r){
    var ranks=[]; Object.keys(r.best).forEach(function(s){ if(r.best[s].rank) ranks.push(r.best[s].rank); });
    r.avgRank=ranks.length?(ranks.reduce(function(x,y){return x+y;},0)/ranks.length):null;
  });
  rows.sort(function(a,b){ return (b.totalDamage||0)-(a.totalDamage||0); });   // 총합 딜량 기준 정렬(고정)
  return {ok:true, ssr:true, season:SSR_SEASON, coefMode:'auto', meta:state.meta||pr.meta, bosses:bosses, members:rows, overrides:[], nonParticipants:[]};
}
function enterShootingRange_(){
  state.ssr=true;
  state.season=SSR_SEASON; state.bossFilter=[]; state.squadFilter=[]; updateOverviewLabel();
  el('memberTable').innerHTML='<div class="muted">유니온 사격장 불러오는 중…</div>';
  loadPracticeData(SSR_SEASON, function(){
    ssrOverrideBosses_();
    applyOverview(buildSsrOverview_());
    ssrApplyPracticeUI_();
  });
}
// 사격장 진입 시 모의전 기록 탭 숨김 + 기록 탭이 선택돼 있으면 조합실험으로.
function ssrApplyPracticeUI_(){
  var recBtn=document.querySelector('#practiceTabs .ptab[data-ptab="record"]'); if(recBtn) recBtn.style.display=state.ssr?'none':'';
  if(state.ssr && state.pTab==='record') state.pTab='exp';
  if(el('page-practice') && el('page-practice').style.display!=='none'){
    if(state.pTab==='exp') loadExpData(SSR_SEASON); else if(state.pTab==='tetris') renderTetris(); else setPTab('exp');
  }
}
function renderBossInfo(){
  if(state.ov&&state.ov.ssr) return ssrRenderBossInfo_();
  var stageCounts=ovBossStageCounts_();
  var cards=state.ov.bosses.map(function(x){
    var u=bossImgUrl(x.img);
    var box='<div class="bimgbox" style="background:'+pastel(x.weakColor)+'">'+(u?'<img src="'+u+'" alt="" onerror="this.remove()">':'')+'<span class="bweakchip" style="background:'+x.weakColor+'">'+esc(x.weak||'')+'</span><span class="bnametag">'+esc(x.name)+'</span>'+ovStageBoxHtml_(stageCounts[x.name])+'</div>';
    var lvNum, hpText, fillPct;   // fillPct = 잔여 HP 비율(체력바, 오른쪽 끝=풀피 100%)
    if(x.unlimited && x.phase4Damage>0){            // 5보스 4단계: 딜량 합산 / ∞ (무제한이라 막대는 풀)
      lvNum=4; hpText=fmtDmg(x.phase4Damage)+' / ∞'; fillPct=100;
    } else if(x.phaseMax>0){                          // 현재 단계 잔여HP / 그 단계 단독 최대HP(Lv3면 hp[3단계]만, 합산 아님)
      lvNum=x.phase||1; hpText=fmtDmg(Math.max(0,x.phaseRemain))+' / '+fmtDmg(x.phaseMax);
      fillPct=Math.max(0,Math.min(100,x.phaseRemain/x.phaseMax*100));
    } else {                                          // 보스 HP 데이터 없음 → 누적딜만
      lvNum=x.phase||1; hpText=fmtDmg(x.cumDamage)+' / ∞'; fillPct=100;
    }
    var bar='<div class="bbar"><i style="width:'+fillPct.toFixed(1)+'%;background:'+x.weakColor+'"></i></div>';
    var coefPct=x.coef*100, coefFill=Math.max(0,Math.min(100,coefPct/2));   // 중앙(50%)=100%, 왼쪽부터 채움
    return '<div class="bcard" onclick="openBoss(\''+jsq(x.name)+'\')">'+
      box+ bar+
      '<div class="bhprow"><div class="blv">Lv.'+lvNum+'</div><div class="bhp">'+hpText+'</div></div>'+
      '<div class="bcoefwrap">'+
        '<div class="bcoeftxt">'+pct(coefPct)+' <span class="blabel">난이도계수</span></div>'+
        '<div class="bcoefbar"><i style="width:'+coefFill.toFixed(1)+'%;background:'+x.weakColor+'"></i></div>'+
      '</div>'+
    '</div>';
  }).join('');
  el('bossInfo').innerHTML=cards;
}
function ssrHideToggles_(hide){
  var wraps=document.querySelectorAll('#page-overview h2 .tgwrap');
  for(var i=0;i<wraps.length;i++) wraps[i].style.display=hide?'none':'';
}
function ssrRenderBossInfo_(){
  el('bossInfo').innerHTML=(state.ov.bosses||[]).map(function(x){
    var u=bossImgUrl(x.img);
    var box='<div class="bimgbox" style="background:'+pastel(x.weakColor)+'">'+(u?'<img src="'+u+'" alt="" onerror="this.remove()">':'')+'<span class="bweakchip" style="background:'+x.weakColor+'">'+esc(x.weak||'')+'</span><span class="bnametag">'+esc(x.name)+'</span></div>';
    // 실제 유레처럼 단계별 체력을 분리 표시. 각 단계 = 그 단계 단독 HP(누적값의 차이). 데이터 없으면 최대 체력 1줄로 폴백.
    var cum=(x.hpCum||[]).map(Number);
    var hpRows=cum.length
      ? cum.map(function(v,i){ var solo=Math.max(0,v-(i?Number(cum[i-1])||0:0));
          return '<div class="bhprow"><div class="blv">'+(i+1)+'단계</div><div class="bhp">'+fmtDmg(solo)+'</div></div>'; }).join('')
      : '<div class="bhprow"><div class="blv">'+esc(x.weak||'')+'</div><div class="bhp">'+fmtDmg(x.maxHp)+'</div></div>';
    return '<div class="bcard ssrcard" onclick="ssrOpenBoss_('+x.step+')">'+box+
      '<div class="bbar"><i style="width:100%;background:'+x.weakColor+'"></i></div>'+
      hpRows+
      '<div class="bcoefwrap"><div class="bcoeftxt">100% <span class="blabel">난이도계수</span></div><div class="bcoefbar"><i style="width:50%;background:'+x.weakColor+'"></i></div></div>'+
    '</div>';
  }).join('');
}
function ssrFmtRank_(r){ return (r==null)?'–':((Math.round(r*10)/10)+'위'); }
function ssrRenderMembers_(){
  var ov=state.ov, bosses=ov.bosses, members=ov.members.slice();   // buildSsrOverview_에서 총합딜 내림차순 정렬됨
  var head='<div class="mentry mhead">'+
    '<div class="mleft">'+
      '<div class="cell">순번</div><div class="cell nick">닉네임</div>'+
      '<div class="cell">싱크로</div>'+
      '<div class="cell">총합딜량</div>'+
      '<div class="cell">평균 등수</div>'+
    '</div>'+
    '<div class="mright"><div class="rtop">'+bosses.map(function(x){ return '<div class="acell" style="flex:1 1 0;background:'+pastel(x.weakColor)+';color:var(--txt);font-weight:var(--fw-strong)" title="'+esc(x.name+' · '+x.weak)+'">'+esc(x.weak)+'</div>'; }).join('')+'</div></div>'+
  '</div>';
  var cards=members.map(function(m,i){

    }).join('');
    return '<div class="mentry">'+
      '<div class="mleft">'+
        '<div class="cell">'+(i+1)+'</div>'+
        '<div class="cell nick" title="'+esc(m.nickname)+'">'+esc(m.nickname)+'</div>'+
        '<div class="cell msync"><span class="synclv">'+(m.syncLv||'–')+'</span></div>'+
        '<div class="cell mtotal"><span class="tdmg">'+fmtDmg(m.totalDamage)+'</span></div>'+
        '<div class="cell mpctcell"><span class="mpct">'+ssrFmtRank_(m.avgRank)+'</span></div>'+
      '</div>'+
      '<div class="mright"><div class="rtop">'+cells+'</div></div>'+
    '</div>';
  }).join('');
  if(!members.length) cards='<div class="muted" style="padding:14px 4px">아직 기록이 없습니다. <b>조합 실험 기록</b> 탭에서 닉네임·싱크로·딜량을 입력하세요.</div>';
  el('memberTable').innerHTML=head+cards;
}

function closeModal(id){ el(id).style.display='none'; }
function saveCoefBatch_(runs,onDone,onFail){
  var season=state.season;
  state.viewEpoch++;
  google.script.run.withSuccessHandler(perfCb('coef-save',function(res){
    var r=unpack(res);
    if(!r||!r.ok){ if(typeof onFail==='function') onFail((r&&r.error)||'저장 실패'); return; }
    state.coefMode='manual'; state.analysis=null; dropOverview_(season,'manual');
    if(r.overview&&r.overview.ok){
      cacheOverview_(r.overview,'manual');
      if(state.season===season&&state.coefMode==='manual') applyOverview(r.overview);
    }
    if(r.analysis&&r.analysis.ok) applyAnalysisData_(r.analysis,'manual',false);
    if(typeof onDone==='function') onDone(r);
  })).withFailureHandler(function(e){ if(typeof onFail==='function') onFail(e.message); }).saveCoefOverrides(season,JSON.stringify(runs),gzOk(),adminKey_());
}
/* ===== 오버딜 모달 ===== */
function openOdModal(ev,boss,nick){
  ev.stopPropagation();
  var cur=state.ovr[ovrKey(boss,nick)]||0;
  el('odModal').innerHTML=
    '<div class="modalbox">'+
      '<h3>'+esc(nick)+' · <span style="color:'+weakColorOf(boss)+'">'+esc(boss)+'</span> 막타 오버딜</h3>'+
      '<label class="muted" style="font-size:12px">억 단위로 입력 (예: 30 → +30억)</label>'+
      '<input type="number" step="1" class="odinput" id="odInput" value="'+(cur?bil(cur):'')+'">'+
      '<div class="modalbtns"><button onclick="closeModal(\'odModal\')">취소</button><button class="primary" onclick="saveOd(\''+jsq(boss)+'\',\''+jsq(nick)+'\')">저장</button></div>'+
    '</div>';
  el('odModal').style.display='flex';
  setTimeout(function(){ var i=el('odInput'); if(i) i.focus(); },30);
}
function saveOd(boss,nick){
  var v=parseFloat((el('odInput')||{}).value); if(isNaN(v)) v=0;
  closeModal('odModal');
  var saveSeason=state.season, saveMode=state.coefMode;
  var newOd=v*1e8, okey=ovrKey(boss,nick), oldOd=state.ovr[okey]||0, delta=newOd-oldOd;
  if(!state.ovrSet) state.ovrSet={};
  var wasEntered=!!state.ovrSet[okey];
  if(newOd>0) state.ovr[okey]=newOd; else delete state.ovr[okey];
  state.ovrSet[okey]=true;   // 모달로 값을 입력했으면(0이라도) '기입됨'으로 표시
  state.viewEpoch++; dropOverview_(saveSeason); state.analysis=null;
  applyOdLocal_(boss,nick,delta);   // 로컬 즉시 반영(딜 값·%·막타 점) — 전체 reload 안 함
  if(el('page-overview').style.display!=='none') renderMembers();
  if(el('page-boss').style.display!=='none' && state.bossData){ renderScatter(state.bossData); renderBossTable(state.bossData); }
  function rollbackOd_(msg){
    if(oldOd>0) state.ovr[okey]=oldOd; else delete state.ovr[okey];
    if(wasEntered) state.ovrSet[okey]=true; else delete state.ovrSet[okey];
    applyOdLocal_(boss,nick,-delta);
    if(el('page-overview').style.display!=='none') renderMembers();
    if(el('page-boss').style.display!=='none' && state.bossData){ renderScatter(state.bossData); renderBossTable(state.bossData); }
    alert('저장 실패: '+msg);
  }
  // 저장 요청 안에서 해당 시즌 완성본을 다시 만들고, 응답이 오면 근사 로컬값을 정확한 서버값으로 교체.
  google.script.run.withSuccessHandler(perfCb('overdamage-save',function(res){
    var r=unpack(res);
    if(!r||!r.ok){ rollbackOd_((r&&r.error)||'알 수 없는 오류'); return; }
    if(r.overview&&r.overview.ok){
      cacheOverview_(r.overview,saveMode);
      if(state.season===saveSeason&&state.coefMode===saveMode) applyOverview(r.overview);
    }
    if(r.autoOverview&&r.autoOverview.ok) cacheOverview_(r.autoOverview,'auto');
    if(r.analysis&&r.analysis.ok && state.coefMode===saveMode) applyAnalysisData_(r.analysis,saveMode,false);
    if(r.bossDetail&&r.bossDetail.ok && state.season===saveSeason && state.boss===boss){
      state.bossData=r.bossDetail; if(r.bossDetail.meta) state.meta=r.bossDetail.meta;
      if(el('page-boss').style.display!=='none'){ renderScatter(r.bossDetail); renderBossTable(r.bossDetail); renderBossComboTree(r.bossDetail); }
    }
  })).withFailureHandler(function(e){ rollbackOd_(e.message); }).saveOverride(saveSeason,boss,nick,newOd,saveMode,gzOk());
}
// 오버딜 변화를 state.ov / state.bossData 에 직접 반영(서버 재집계 없이): 해당 멤버 딜·보정·막타 + 전체 % 근사 재계산.
function applyOdLocal_(boss,nick,delta){
  if(!delta) return;
  var ov=state.ov;
  if(ov&&ov.members){
    var coef=1; (ov.bosses||[]).forEach(function(x){ if(x.name===boss) coef=x.coef||1; });
    var m=ov.members.filter(function(x){return x.nickname===nick;})[0];
    if(m){
      m.totalDamage=(m.totalDamage||0)+delta;
      m.corrected=(m.corrected||0)+delta*coef;
      if(m.perBoss) m.perBoss[boss]=(m.perBoss[boss]||0)+delta;
      var pd=m.perBossDetail&&m.perBossDetail[boss]; if(pd) pd.damage=(pd.damage||0)+delta;
      if(m.hits){ for(var hi=m.hits.length-1;hi>=0;hi--){ if(m.hits[hi].boss===boss&&m.hits[hi].isFinalHit){ m.hits[hi].damage+=delta; break; } } }
    }
    var memTotal=0,sumCorr=0; ov.members.forEach(function(x){ memTotal+=x.totalDamage||0; sumCorr+=x.corrected||0; });
    var hits=(ov.meta&&ov.meta.totalHits)||ov.members.length||1;
    var meanCorr=hits?sumCorr/hits:0, avgM=ov.members.length?memTotal/ov.members.length:0;
    ov.members.forEach(function(x){ x.share=avgM>0?x.totalDamage/avgM*100:0; x.contrib=meanCorr>0?x.corrected/(meanCorr*3)*100:0; });
  }
  var bd=state.bossData;
  if(bd&&bd.boss===boss&&bd.points){
    for(var i=bd.points.length-1;i>=0;i--){ if(bd.points[i].nickname===nick&&bd.points[i].isFinalHit){ bd.points[i].damage+=delta; bd.points[i].overdamage=(bd.points[i].overdamage||0)+delta; break; } }
  }
}

function acellBoss(boss,m){
  var nick=m.nickname, pd=(m.perBossDetail||{})[boss];
  if(!pd) return '<div class="acell empty">·</div>';
  var hits=(m.hits||[]).filter(function(h){ return h.boss===boss; });   // 같은 보스 2타 분리용(개별 딜·스쿼드)
  var sf=state.squadFilter||[];
  // O3: 니케 필터는 그 보스의 모든 타격 스쿼드를 검사(첫 타격만 보지 않음)
  if(state.bossCellMode==='squad' && sf.length && !hits.some(function(h){ return squadHasSel_(h.squad); })) return '<div class="acell empty">·</div>';
  var over=state.ovr[ovrKey(boss,nick)]||0;   // 오버딜 입력 시 딜량(이미 합산됨)을 파란색으로, 테두리도 파랑(odset)
  var click=pd.isFinalHit?' onclick="openOdModal(event,\''+jsq(boss)+'\',\''+jsq(nick)+'\')"':'';
  var multi=hits.length>1, body;
  if(state.bossCellMode==='squad'){   // O2: 같은 보스 2타면 스쿼드를 위아래로 스택
    var squads=multi?hits.map(function(h){return h.squad;}):[pd.squad];
    body='<div class="bossSquadOnly'+(multi?' multi':'')+'">'+squads.map(function(sq){ return squadHtml(sq,true)||'<span class="muted">·</span>'; }).join('')+'</div>';
  } else {   // O2: 같은 보스 2타면 위=합산, 아래=개별
    if(multi){
      var sum=over>0?'<span class="odon">'+fmtEok1(pd.damage)+'</span>':fmtEok1(pd.damage);   // 합산딜은 오버딜 반영 시 파랑
      var split=hits.map(function(h){ var v=fmtEok1(h.damage); return h.isFinalHit?'<span class="finaldmg" title="막타">'+v+'</span>':v; }).join(' · ');   // 개별 막타값=빨강(막타 식별)
      body='<div class="acdmg"><div class="acsum">'+sum+'</div><div class="acsplit">'+split+'</div></div>';
    } else {
      var cls1=odDmgCls_(boss,nick,pd.isFinalHit);   // 단일 막타: 오버딜>0 파랑 / 미기입 빨강 / 0기입 무색
      body='<div>'+(cls1?'<span class="'+cls1+'"'+(cls1==='odmiss'?' title="오버딜 미기입"':'')+'>'+fmtEok1(pd.damage)+'</span>':fmtEok1(pd.damage))+'</div>';
    }
  }
  return '<div class="acell bosscell'+(pd.isFinalHit?' final':'')+(over>0?' odset':'')+'" style="background:'+pastel(weakColorOf(boss))+'"'+click+'>'+body+'</div>';
}
function tacell(hh,nick){
  var over=state.ovr[ovrKey(hh.boss,nick)]||0;
  var click=hh.isFinalHit?' onclick="openOdModal(event,\''+jsq(hh.boss)+'\',\''+jsq(nick)+'\')"':'';
  var cls=odDmgCls_(hh.boss,nick,hh.isFinalHit);   // 막타만 색칠 — 오버딜한(막타) 공격에만 파랑/미기입 빨강
  var dmg=cls?'<span class="'+cls+'"'+(cls==='odmiss'?' title="오버딜 미기입"':'')+'>'+fmtEok1(hh.damage)+'</span>':fmtEok1(hh.damage);
  var odset=hh.isFinalHit&&over>0;
  return '<div class="tacell'+(hh.isFinalHit?' final':'')+(odset?' odset':'')+'" style="background:'+pastel(weakColorOf(hh.boss))+'"'+click+'><span class="bn">'+esc(hh.boss)+'</span> '+dmg+'</div>';

function renderMembers(){

  // 필터: 보스칸 선택은 AND 조건(선택한 보스를 모두 친 멤버만). 표시 자체는 남은 3타까지 유지.
  if(bf.length) members=members.filter(function(m){ return memberHasBossFilter_(m,bf); });

  if(sf.length && squadVisible) members=members.filter(function(m){ return memberHasAnyNike_(m); });   // 선택 니케가 든 조합이 하나라도 있는 멤버만(없는 조합은 셀 단위로 숨김)
  // 정렬: 열제목 클릭(내림→오름→해제)이 있으면 그걸로, 없으면 보스 선택 합산 → 선택 지표 순.

  } else if(bf.length){
    members.sort(function(a,b){

      var ad=bossFilterDamage_(a,bf), bd=bossFilterDamage_(b,bf); if(ad!==bd) return bd-ad;

    : '<div class="rtop"><div class="acell" style="flex:1 1 0;background:transparent;color:var(--txt);font-weight:var(--fw-strong)">1타 → 3타 (보스 · 딜량)</div></div>';
  var head='<div class="mentry mhead">'+
    '<div class="mleft">'+
      '<div class="cell">순번</div><div class="cell nick" style="cursor:pointer" onclick="ovSortBy(\'nick\')">닉네임'+ovSortArrow_('nick')+'</div>'+
      '<div class="cell" style="cursor:pointer" onclick="ovSortBy(\'syncLv\')">싱크로'+ovSortArrow_('syncLv')+'<div class="bsub">참여·막타</div></div>'+
      '<div class="cell" style="cursor:pointer" onclick="ovSortBy(\'totalDamage\')">총합딜량'+ovSortArrow_('totalDamage')+'</div>'+
      '<div class="cell" style="cursor:pointer" onclick="ovSortBy(\''+state.metric+'\')">'+esc(label)+ovSortArrow_(state.metric)+'</div>'+
    '</div>'+
    '<div class="mright">'+headTop+'</div>'+
  '</div>';

  var cards=members.map(function(m,i){
    // 공격 순서 정렬=RawData 수집 순서의 역순(attackIndex 오름차순). 보스 별 정렬=보스 step 순.
    var hs=(state.view==='tasu')?m.hits.slice().sort(function(a,b){ return (Number(a.attackIndex)||0)-(Number(b.attackIndex)||0); }):m.hits.slice().sort(function(a,b){return (a.step-b.step)||(b.damage-a.damage);});
    if(state.view==='tasu' && sf.length) hs=hs.filter(function(hh){ return squadHasSel_(hh.squad); });   // 공격순서 뷰: 선택 니케 없는 조합 숨김

    var combos=state.view==='tasu'?'<div class="rbot">'+(hs.map(comboCell).join('')||'<span class="muted">—</span>')+'</div>':'';

      '</div>'+

  el('memberTable').innerHTML=head+cards+absentCardsHtml_(bf,sf);

function bswitchClick(name){ if(name===state.boss) showPage('overview'); else openBoss(name); }
// 사격장 보스 상세: 서버 데이터 없음 → 조합실험 기록(Practice extended)으로 합성. 속성(step)별 멤버 best 1타의 싱크로/조합/딜량.
function ssrOpenBoss_(step){
  step=Number(step); state.ssrBossStep=step; state.boss='빅 암즈'; state.bossComboSel=null;
  if(!state.ovr) state.ovr={}; if(!state.ovrSet) state.ovrSet={};
  showPage('boss'); renderBossSwitch();
  var pb=el('page-boss'); pb.classList.remove('anim'); void pb.offsetWidth; pb.classList.add('anim');
  var bd=buildSsrBossDetail_(step); state.bossData=bd;
  renderScatter(bd); renderBossTable(bd); renderBossComboTree(bd);
}
function buildSsrBossDetail_(step){
  var pr=state.practice||{}, code=codeOfStep(step)||'', points=[];
  (pr.members||[]).forEach(function(m){
    var best=null, d=m.data||{};
    (d.extended||[]).forEach(function(set){
      var sync=Number(set.syncLv)||Number(m.syncLv)||0;
      (set.attacks||[]).forEach(function(a){
        if(Number(a.boss)!==step) return; var dmg=Number(a.damage)||0; if(dmg<=0) return;
        if(!best||dmg>best.damage) best={nickname:m.nickname, syncLv:sync, damage:dmg, squad:parseCombo(a.combo||''), isFinalHit:false, level:0};
      });
    });
    if(best) points.push(best);
  });
  return {ok:true, ssr:true, boss:'빅 암즈', weak:code, points:points, trend:null, meta:state.meta};
}
function openBoss(name){
  state.boss=name; state.ssrBossStep=null; state.bossComboSel=null; showPage('boss'); renderBossSwitch();
  var pb=el('page-boss'); pb.classList.remove('anim'); void pb.offsetWidth; pb.classList.add('anim');   // 진입 애니메이션 재생
  el('bossDetailTable').innerHTML='<tr><td class="muted">불러오는 중…</td></tr>';
  google.script.run.withSuccessHandler(perfCb('bossDetail', function(res){
    var bd=unpack(res);
    if(!bd.ok){ el('bossDetailTable').innerHTML='<tr><td class="muted">'+esc(bd.error)+'</td></tr>'; return; }
    state.bossData=bd; if(bd.meta) state.meta=bd.meta;
    renderScatter(bd); renderBossTable(bd); renderBossComboTree(bd);
  })).withFailureHandler(function(e){ el('bossDetailTable').innerHTML='<tr><td class="muted">오류: '+esc(e.message)+'</td></tr>'; }).getBossDetail(state.season,name,gzOk());
}
function ptColor(p){   // 테두리 색: 막타=빨강, 그 외 단계별 1=녹색 2=파랑 3~4=보라
  if(p.isFinalHit) return '#e23a4e';
  var lv=Number(p.level)||0;
  if(lv<=1) return '#3ac06b';
  if(lv===2) return '#3a8fe8';
  return '#9b59e8';
}
function renderScatter(bd){
  var pts=bd.points.map(function(p){ return {x:p.syncLv,y:p.damage/1e8,_p:p}; });
  // 비막타=옅은 파랑 점+단계색 테두리. 막타=빨간 점(오버딜>0이면 파란 테두리, 미기입/0이면 빨간 테두리=붉은 원).
  function pFinalOver_(p){ return (state.ovr&&state.ovr[ovrKey(bd.boss,p.nickname)])||0; }
  // 조합 선택 시: 그 조합 스쿼드의 점만 강조, 나머지는 회색(아래 트리에서 끝 칸 클릭).
  var sel=state.bossComboSel||'', match=bd.points.map(function(p){ return !sel || bossSquadSig_(p.squad)===sel; });
  var datasets=[{ label:'기록', data:pts,
    pointBackgroundColor:bd.points.map(function(p,i){ return match[i]?(p.isFinalHit?'#e23a4e':'#cfe0ff'):'#e3e6ee'; }),
    pointBorderColor:bd.points.map(function(p,i){ return match[i]?(p.isFinalHit?(pFinalOver_(p)>0?'#1746c7':'#e23a4e'):ptColor(p)):'#c2c7d2'; }),
    pointBorderWidth:bd.points.map(function(p,i){ return !match[i]?1:((p.isFinalHit&&pFinalOver_(p)>0)?3:2.5); }),
    pointRadius:bd.points.map(function(p,i){ return match[i]?5.5:3.5; }), pointHoverRadius:7.5, type:'scatter' }];
  if(bd.trend){
    var lv=bd.points.map(function(p){return p.syncLv;}).filter(function(v){return v>0;}), lo=Math.min.apply(null,lv), hi=Math.max.apply(null,lv), line=[];
    var stepv=Math.max(1,(hi-lo)/40)||1;
    for(var x=Math.max(1,lo); x<=hi; x+=stepv) line.push({x:x,y:(bd.trend.a*Math.pow(x,bd.trend.b))/1e8});
    datasets.push({ label:'추세선 a·x^b', data:line, type:'line', borderColor:'#f0a93a', borderWidth:2, pointRadius:0, fill:false });
  }
  if(scatterChart) scatterChart.destroy();
  scatterChart=new Chart(el('scatter'),{ data:{datasets:datasets}, options:{ responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{labels:{color:'#6c7488'}}, tooltip:{callbacks:{label:function(c){ var p=c.raw._p; return p?(p.nickname+' · 싱크로 '+p.syncLv+' · '+fmtDmg(p.damage)+(p.isFinalHit?' (막타)':'')):''; }}} },
    scales:{ x:{ title:{display:true,text:'싱크로 레벨',color:'#6c7488'}, ticks:{color:'#6c7488'}, grid:{color:'#dde2ef'} }, y:{ title:{display:true,text:'딜량(억)',color:'#6c7488'}, ticks:{color:'#6c7488'}, grid:{color:'#dde2ef'} } } } });
}
function renderBossTable(bd){
  var t=bd.trend;

}
function pSimpleEntry_(d,step){
  var e=d&&d.simple&&d.simple[step];
  if(!e) return null;
  return ((Number(e.damage)||0)>0 || e.combo) ? {damage:Number(e.damage)||0, combo:e.combo||''} : null;
}
function pHasAnySimple_(d){
  if(!d||!d.simple) return false;
  for(var k in d.simple){ if(pSimpleEntry_(d,k)) return true; }
  return false;
}
function pBestExtendedSet_(d){
  if(!d) return null;
  var best=null, bestSum=-1;
  pDisplayExtendedSets_(d).forEach(function(set){
    var sum=0, has=false;
    (set.attacks||[]).forEach(function(a){ var dm=Number(a.damage)||0; if(dm>0){ sum+=dm; has=true; } });
    if(has && sum>bestSum){ bestSum=sum; best=set; }
  });
  return best;
}
function pBestEntry(d,step){
  if(!d) return null;
  d=pNormalizeSingles_(d);
  if(pHasAnySimple_(d)) return pSimpleEntry_(d,step);
  var set=pBestExtendedSet_(d), found=null;
  (set&&set.attacks||[]).forEach(function(a){
    if(Number(a.boss)!==Number(step)) return;
    if(!found) found={damage:0,combo:'',_combos:[]};
    found.damage+=Number(a.damage)||0;
    if(a.combo) found._combos.push(a.combo);
  });
  if(found) found.combo=found._combos.join(' / ');
  return (found&&((Number(found.damage)||0)>0||found.combo)) ? {damage:Number(found.damage)||0, combo:found.combo||''} : null;
}
function psquadHtml(combo){
  var parsed=parseCombo(combo); if(!parsed.length) return '<span class="muted">·</span>';
  return '<div class="psquad">'+parsed.map(function(c){ var u=nikImg(c);
    return u?('<img src="'+u+'" title="'+esc(c.name)+'" loading="lazy" onerror="this.outerHTML=\'<span class=pph>'+esc(c.name.slice(0,2))+'</span>\'">'):('<span class="pph" title="'+esc(c.name)+'">'+esc(c.name.slice(0,2))+'</span>');

function togglePExpand(nk){ state.pExpand[nk]=!state.pExpand[nk]; renderPracticeTable(); }
function togglePMode(ev){ if(ev) ev.stopPropagation(); state.pToggle=(state.pToggle==='dmg')?'combo':'dmg'; renderPracticeTable(); }
function togglePSyncSort(ev){ if(ev) ev.stopPropagation(); state.pSyncSort=!state.pSyncSort; renderPracticeTable(); }
function pSyncLv_(m){
  var mp=(state.practice&&state.practice.syncMap)||{};

function pCellContent(step,entry){   // 토글에 따라 딜량 또는 조합(스쿼드)
  if(!entry) return '<span class="pdmgv empty">·</span>';

// 세트(3타 조합) 코멘트: overall 우선, 없으면 옛 타수별 코멘트를 합쳐 표시(하위호환)
function pSetComment(set){ if(set&&set.overall) return set.overall; var l=((set&&set.attacks)||[]).filter(function(a){return a.comment;}).map(function(a){return a.comment;}); return l.join(' / '); }
function pBossFilterList_(){
  return Object.keys(state.pBossFilter||{}).filter(function(k){return state.pBossFilter[k];}).map(Number).sort(function(a,b){return a-b;});
}
function pToggleBossFilter(step,ev){
  if(ev) ev.stopPropagation();
  step=Number(step);
  var f=state.pBossFilter||(state.pBossFilter={});
  if(f[step]) delete f[step];
  else {
    var n=Object.keys(f).filter(function(k){return f[k];}).length;
    if(n>=3) return;
    f[step]=true;
  }

function pDataBossSteps_(d){
  var seen={}, out=[];
  if(!d) return out;
  d=pNormalizeSingles_(d);
  if(d.simple){ for(var k in d.simple){ if(pSimpleEntry_(d,k)) seen[Number(k)]=1; } }
  (d.extended||[]).forEach(function(set){ (set.attacks||[]).forEach(function(a){
    var s=Number(a.boss)||0; if(s&&((Number(a.damage)||0)>0||a.combo)) seen[s]=1;
  }); });
  Object.keys(seen).forEach(function(k){ out.push(Number(k)); });
  out.sort(function(a,b){return a-b;});
  return out;
}
function pHasRecord_(d){ return pDataBossSteps_(d).length>0; }
function pDataBossDamage_(d,step){
  var best=0, e, sum;
  d=pNormalizeSingles_(d);
  e=pSimpleEntry_(d,step);
  if(e) best=Math.max(best,Number(e.damage)||0);
  (d&&d.extended||[]).forEach(function(set){
    sum=0;
    (set.attacks||[]).forEach(function(a){ if(Number(a.boss)===Number(step)) sum+=Number(a.damage)||0; });
    best=Math.max(best,sum);
  });
  return best;
}
function pSortPracticeMembers_(members){
  var checked=pBossFilterList_();
  var out=members.map(function(m,i){ return {m:m,i:i}; });
  function byRecord_(a,b){
    var ar=pHasRecord_(a.m.data)?1:0, br=pHasRecord_(b.m.data)?1:0;
    if(ar!==br) return br-ar;
    if(state.pSyncSort){
      var av=pSyncLv_(a.m), bv=pSyncLv_(b.m);
      if(av!==bv) return bv-av;
    }
    return a.i-b.i;
  }
  if(!checked.length) return out.sort(byRecord_).map(function(x){return x.m;});
  out.sort(function(a,b){
    var ar=pHasRecord_(a.m.data)?1:0, br=pHasRecord_(b.m.data)?1:0; if(ar!==br) return br-ar;
    var as=pDataBossSteps_(a.m.data), bs=pDataBossSteps_(b.m.data), am={}, bm={}, ac=0, bc=0, i;
    as.forEach(function(s){am[s]=1;}); bs.forEach(function(s){bm[s]=1;});
    for(i=0;i<checked.length;i++){ if(am[checked[i]]) ac++; if(bm[checked[i]]) bc++; }
    if(ac!==bc) return bc-ac;
    var aAll=(ac===checked.length)?1:0, bAll=(bc===checked.length)?1:0; if(aAll!==bAll) return bAll-aAll;
    if(state.pSyncSort){
      var av=pSyncLv_(a.m), bv=pSyncLv_(b.m);
      if(av!==bv) return bv-av;
    }
    var ad=0, bd=0; for(i=0;i<checked.length;i++){ ad+=pDataBossDamage_(a.m.data,checked[i]); bd+=pDataBossDamage_(b.m.data,checked[i]); }
    if(ad!==bd) return bd-ad;
    var ak=as.join(','), bk=bs.join(','); if(ak!==bk) return ak<bk?-1:1;
    return String(a.m.nickname)<String(b.m.nickname)?-1:(String(a.m.nickname)>String(b.m.nickname)?1:0);
  });
  return out.map(function(x){return x.m;});
}
// 펼침은 **3타(extended) 분해 전용** — 세트별 3타 조합 행(쓴 보스만 색칠) + 옆에 3타 조합 코멘트.
// (simple 모드는 분해할 게 없어 펼침 안 함 — 호출 측에서 extended 있을 때만 부름)
function pHasExt(d){ return pDisplayExtendedSets_(d).length>0; }
function pSubRows(d,nk){
  var pr=state.practice, out='';
  function row(set,sum,cmt){
    return '<tr class="psub" data-nick="'+esc(nk||'')+'"><td class="psubmark">↳</td><td class="psync"><span class="psubsum" title="3타 합산 딜량">'+(sum>0?esc(fmtEok1(sum)):'')+'</span></td>'+pr.bosses.map(function(b){
    var list=(set.attacks||[]).filter(function(x){ return Number(x.boss)===Number(b.step) && pAttackHasContent_(x); });
    if(!list.length) return '<td></td>';
    var html=list.length===1 ? pCellContent(b.step,list[0]) : '<div class="pdstack">'+list.map(function(a){ return '<div>'+pCellContent(b.step,a)+'</div>'; }).join('')+'</div>';
    return '<td style="background:'+pastel(b.weakColor)+'">'+html+'</td>';
  }).join('')+'<td class="pcmt">'+(cmt||'')+'</td></tr>'; }
  // 총합 딜량 높은 순으로 정렬해 펼침(가장 센 3타 세트가 위)
  var sets=pDisplayExtendedSets_(d).map(function(set){ var sum=0; (set.attacks||[]).forEach(function(a){ sum+=Number(a.damage)||0; }); return {set:set,sum:sum}; });
  sets.sort(function(a,b){ return b.sum-a.sum; });
  sets.forEach(function(o){ out+=row(o.set, o.sum, esc(pSetComment(o.set))); });
  return out;
}

    var cells=pr.bosses.map(function(b){ var e=pBestEntry(d,b.step), c=pCellContent(b.step,e), bg=e?' style="background:'+pastel(b.weakColor)+'"':'';

function pNickSearchInput_(v){ state.pNickSearch=v||''; pApplyNickFilter_(); }   // 입력 즉시 DOM 숨김(재렌더 없이 포커스 유지)
function pApplyNickFilter_(){

}
function pEmpty5_(){ var s={}; for(var i=1;i<=5;i++) s[i]={combo:'',damage:0,comment:''}; return s; }
function pAttackHasContent_(a){ return !!a && ((Number(a.damage)||0)>0 || !!String(a.combo||'').trim()); }
function pCloneAttack_(a){ return { boss:Number(a.boss)||1, combo:a.combo||'', damage:Number(a.damage)||0, comment:a.comment||'' }; }
function pFilledAttacks_(set){
  return ((set&&set.attacks)||[]).map(pCloneAttack_).filter(function(a){ return (Number(a.boss)||0) && pAttackHasContent_(a); });
}
function pPutBestSimple_(simple,a,overall){
  var s=Number(a.boss)||0; if(!s) return;
  var cur=simple[s]||(simple[s]={combo:'',damage:0,comment:''});
  var cd=Number(cur.damage)||0, ad=Number(a.damage)||0;
  if(!pAttackHasContent_(cur) || ad>cd || (ad===cd && !cur.combo && a.combo)){
    simple[s]={ combo:a.combo||'', damage:ad, comment:a.comment||overall||cur.comment||'' };
  }
}
function pNormalizeSingles_(data){
  data=data||{};
  var simple=pEmpty5_(), ext=[];
  for(var s=1;s<=5;s++){
    var d=(data.simple&&data.simple[s])||{};
    simple[s]={combo:d.combo||'',damage:Number(d.damage)||0,comment:d.comment||''};
  }
  (data.extended||[]).forEach(function(set){
    var atks=pFilledAttacks_(set);
    if(atks.length===1){ pPutBestSimple_(simple,atks[0],set.overall||''); return; }
    if(atks.length>=2) ext.push({attacks:atks,overall:set.overall||''});
  });
  var mode=data.mode||'simple';
  if(mode==='extended' && !ext.length) mode='simple';
  return { mode:mode, simple:simple, extended:ext, priority:(data.priority||[]).slice(), comment:data.comment||'' };
}
function pDisplayExtendedSets_(d){ return pNormalizeSingles_(d).extended||[]; }

/* ----- 니케 사전 인덱스(별칭/파일/버스트/코드): dataNik.csv 로드 후 1회 구성 ----- */
function buildNikIndex(){
  var nik=(state.practice&&state.practice.nik)||[];
  var idx={ exact:{}, list:[] };
  nik.forEach(function(e){
    var entry={ name:e.n, file:e.f, burst:e.b, code:e.c, alias:e.a };
    idx.list.push(entry);
    idx.exact[e.n]=entry;
    if(e.a) idx.exact[e.a]=entry;   // 줄임말 정확 일치
  });
  // 유니온 축약어 병합(제작자 dataNik.csv 위에 덧댐 — 덮어쓰지 않음): alias → 실제 니케
  var uniAlias=(state.practice&&state.practice.aliases)||[];
  uniAlias.forEach(function(a){ if(!a.name||!a.alias) return; var e=idx.exact[a.name]; if(!e){ e={name:a.name,file:null,burst:'',code:'',alias:''}; } idx.exact[a.alias]=e; });
  state.nikIdx=idx;
  // 그리디 매칭용 키 목록(긴 키 우선). 니케 이름엔 공백·콜론이 들어감(예 "아니스 : 스타")
  // → 토큰 분리로는 깨지므로 가장 긴 키부터 통째로(경계 확인) 매칭한다.
  var names=(state.practice&&state.practice.names)||[], keys=[], seen={};
  function addKey(k,getEntry){ if(!k||seen[k]) return; seen[k]=1; keys.push({k:k,get:getEntry}); }
  // 유니온 축약어를 먼저 등록 → 같은 문자열이 제작자 기본 줄임말과 충돌하면 유니온 별칭이 우선(addKey의 seen 선점).
  uniAlias.forEach(function(a){ if(!a.alias) return; var e=idx.exact[a.alias]; if(e) addKey(a.alias,function(){return e;}); });
  idx.list.forEach(function(e){ addKey(e.name,function(){return e;}); if(e.alias) addKey(e.alias,function(){return e;}); });
  names.forEach(function(nm){ addKey(nm,null); });   // RawData 실제 이름(사전에 없는 신캐 등)
  keys.sort(function(a,b){ return b.k.length-a.k.length; });
  state.nikKeys=keys;
}
// 사전 엔트리 → 칩/이미지용 객체
function nikEntry_(e){ var nameTid=(state.practice&&state.practice.nameTid)||{}; return { name:e.name, tid:(nameTid[e.name]!=null?nameTid[e.name]:null), file:e.file, code:e.code, burst:e.burst, known:true }; }
function nikResolve(tok){   // 한 토큰 → 사전 엔트리(정확 → 접두). 느슨한 부분일치는 오매칭 유발해 제거.
  var idx=state.nikIdx; if(!idx) return null;
  if(idx.exact[tok]) return idx.exact[tok];
  for(var i=0;i<idx.list.length;i++){ var x=idx.list[i]; if(x.name.indexOf(tok)===0||(x.alias&&x.alias.indexOf(tok)===0)) return x; }
  return null;
}
/* ----- 조합 텍스트 파싱(니케 이름/줄임말 → 칩+이미지) -----
   니케 이름에 공백·콜론이 있어("아니스 : 스타") 단순 토큰 분리로는 깨진다.
   → 왼쪽부터 사전 키(이름/줄임말/RawData이름)를 가장 긴 것부터 통째로 매칭하되,
     매칭 끝이 구분자/문장끝이어야 인정(경계 확인) → 공백 포함 이름도 한 덩어리로 복원.
     매칭 실패한 토큰만 기존 방식(정확→접두)으로 폴백 → 자유 입력 축약어도 유지. */
function parseCombo(text){
  var s=String(text||''), n=s.length, keys=state.nikKeys||[];
  var names=(state.practice&&state.practice.names)||[], nameTid=(state.practice&&state.practice.nameTid)||{};
  var sep=/[\s,/·]/, out=[], i=0;
  while(i<n){
    while(i<n && sep.test(s.charAt(i))) i++;   // 앞쪽 구분자 건너뛰기
    if(i>=n) break;
    var matched=null;
    for(var k=0;k<keys.length;k++){   // 긴 키부터: 통째로 일치하고 끝이 경계면 채택
      var key=keys[k].k, L=key.length;
      if(L && s.substr(i,L)===key && (i+L>=n || sep.test(s.charAt(i+L)))){ matched=keys[k]; break; }
    }
    if(matched){
      var e=matched.get?matched.get():null;
      out.push(e?nikEntry_(e):{ name:matched.k, tid:(nameTid[matched.k]!=null?nameTid[matched.k]:null), file:null, known:true });
      i+=matched.k.length;
    } else {
      var j=i; while(j<n && !sep.test(s.charAt(j))) j++;   // 다음 구분자까지 한 토큰
      var tok=s.substring(i,j); i=j;
      var r=nikResolve(tok);   // 폴백: 정확→접두(자유 입력 축약어)
      if(r){ out.push(nikEntry_(r)); continue; }
      var m=null,p;
      for(p=0;p<names.length;p++){ if(names[p]===tok){ m=names[p]; break; } }
      if(!m) for(p=0;p<names.length;p++){ if(names[p].indexOf(tok)===0){ m=names[p]; break; } }
      out.push({ name:(m||tok), tid:(m?nameTid[m]:null), file:null, known:!!m });
    }
  }
  return out;
}
function nikImg(c){ return c.file?imgFromFile(c.file):((c.tid!=null)?imgFromTid(c.tid):''); }
function pchipSpans(parsed,cnt){
  return parsed.map(function(c){
    var dup=cnt&&cnt[c.name]>1, u=nikImg(c);
    return '<span class="pchip'+(c.known?'':' unknown')+(dup?' dup':'')+'">'+(u?'<img src="'+u+'" onerror="this.remove()">':'')+'<span class="pchipn">'+esc(c.name)+'</span></span>';

}
function pchipImgs_(parsed,cnt){   // 조합 입력 미리보기: 니케 이미지만(이름 없이) 한 줄 — 중복 니케는 빨강 테두리

}
function onPSimpleCombo(s,val){ state.pedit.simple[s].combo=val; var c=el('pscchips_'+s); if(c) c.innerHTML=pchipSpans(parseCombo(val)); }
function onPExtCombo(i,j,val){ state.pedit.extended[i].attacks[j].combo=val; updateSetChips(i); }

function newPedit(nk,data){

    return { attacks:atks, overall:(set.overall||'') };   // 타별 코멘트는 attacks에 보존(세트 코멘트로 흡수하지 않음)
  });

function pBossName(s){ var b=state.practice.bosses.filter(function(x){return x.step===s;})[0]; return b?b.name:('보스'+s); }

function pdmgv(raw){ return raw>0?(raw/1e8):''; }
function recData_(){
  var r=(state.practice&&state.practice.recommended)||{};
  if(!r.single) r.single={};
  if(!r.triples) r.triples=[];
  return r;
}
function recNormCombo_(t){ return parseCombo(t).map(function(c){return c.name;}).join(', '); }
function recForStep_(step){ return recData_().single[String(step)]||null; }
function recAttackSame_(a,r){
  if(!a||!r) return false;
  return recNormCombo_(a.combo)===recNormCombo_(r.combo);
}
function recSteps_(attacks){ return (attacks||[]).map(function(a){return Number(a.boss)||0;}).filter(Boolean).sort(function(a,b){return a-b;}).join(','); }

  return (set&&set.attacks||[]).some(function(a){ return !!(a.combo||'').trim(); });
